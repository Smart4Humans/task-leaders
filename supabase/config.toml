# Supabase project configuration
# https://supabase.com/docs/guides/cli/config

# ── Edge function settings ──────────────────────────────────────────────────
# All functions set verify_jwt = false because:
#  - Public-facing functions (apply, public-*, lead-event) are called by the browser with no auth
#  - Provider-facing functions (get-provider, complete-onboarding) use slug-based auth
#  - Admin functions (approve-application) use a server-side admin_password secret
# Never add the anon key to client-side HTML — these functions handle their own auth logic.

[functions.apply]
verify_jwt = false

[functions.public-homepage]
verify_jwt = false

[functions.public-category]
verify_jwt = false

[functions.public-profile]
verify_jwt = false

[functions.lead-event]
verify_jwt = false

[functions.get-provider]
verify_jwt = false

[functions.complete-onboarding]
verify_jwt = false

[functions.approve-application]
verify_jwt = false

# ── Messaging engine functions (Phase 2) ────────────────────────────────────

# Outbound WhatsApp dispatcher. Internal admin-triggered sends.
# Auth: x-internal-secret header (INTERNAL_CRON_SECRET) or admin_password in body.
[functions.send-whatsapp]
verify_jwt = false

# Inbound Twilio webhook. Receives all messages to the TaskLeaders WhatsApp number.
# Routes by sender identity + session state. State machine entry point.
# Configured in Twilio Console as the webhook URL for the TaskLeaders number.
[functions.twilio-webhook]
verify_jwt = false

# Twilio Programmable Messaging status callback receiver (Phase 0.5).
# Updates message_log.status post-delivery (delivered / read / undelivered /
# failed) and raises admin_alerts on terminal failures. Auth: X-Twilio-Signature
# validated against TWILIO_STATUS_CALLBACK_URL env var.
[functions.twilio-status-callback]
verify_jwt = false

# Concierge broadcast engine. Sends WT-2 to all eligible Concierge TaskLeaders.
# Eligibility: concierge_eligible=true, category match, city match, not suspended.
# Auth: x-internal-secret or admin_password.
[functions.job-dispatch]
verify_jwt = false

# Stripe payment link / auto-charge. Called after a provider claims a job (ACCEPT).
# Handles both card_on_file (auto-charge) and payment_link paths.
# Auth: x-internal-secret or admin_password.
[functions.create-payment-link]
verify_jwt = false

# Stripe webhook receiver. Processes payment_intent.succeeded / failed,
# checkout.session.completed. Registered in Stripe Dashboard > Webhooks.
[functions.stripe-webhook]
verify_jwt = false

# pg_cron target. Runs every minute via pg_net. Processes open payment_warning
# and payment_released admin_alerts. Sends WT-6 (5 min remaining) and WT-7
# (lead released). Auth: x-cron-secret header (INTERNAL_CRON_SECRET).
[functions.process-timeouts]
verify_jwt = false

# Marketplace Connect form handler. Called from profile.html Connect button.
# Takes client details + request, creates marketplace job, notifies targeted provider.
# All communication still routes through the TaskLeaders WhatsApp number.
[functions.marketplace-connect]
verify_jwt = false

# ── Phase 4 — Survey, reliability, escalation ────────────────────────────────

# Admin endpoint to trigger WC-3 (post-job survey) or WT-3 (ETA reminder).
# WT-3 checks: thread active, not already sent, no recent provider message.
# Auth: admin_password in body.
[functions.trigger-survey]
verify_jwt = false

# Processes pending reliability_inputs and updates providers.reliability_percent.
# Reliability is separate from response_time_minutes (updated via record_response_time RPC).
# Called internally after survey completion and by admin for recomputation.
[functions.apply-reliability]
verify_jwt = false

# ── Provider profile management (private) ───────────────────────────────────

# Returns all provider_accounts fields for the private management page prefill.
# Auth: slug = identity. Distinct from get-provider (public fields only).
[functions.get-provider-private]
verify_jwt = false

# Creates (or retrieves) a Stripe Customer and a SetupIntent for card-on-file setup.
# Called before stripe.confirmCardSetup() on the frontend.
# Auth: slug = identity.
[functions.create-setup-intent]
verify_jwt = false

# Called after stripe.confirmCardSetup() succeeds. Attaches PaymentMethod to
# Stripe Customer, sets as default, writes card_on_file = true to provider_accounts.
# Auth: slug = identity.
[functions.confirm-card-setup]
verify_jwt = false
