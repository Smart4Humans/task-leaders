<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Profile Review — TaskLeaders Admin</title>
  <style>
    :root {
      --blue:   #0066ff;
      --blue-dark: #0052cc;
      --green:  #00c853;
      --gold:   #ffb800;
      --amber:  #f59e0b;
      --red:    #ff4d4d;
      --bg:     #0a0a14;
      --card:   rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --muted:  rgba(255,255,255,0.55);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
    }
    .back {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .back:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .logo {
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo .task { color: var(--blue); }
    .logo .leaders { color: #fff; }
    .header-label {
      font-size: 13px;
      color: var(--muted);
      margin-left: 2px;
    }

    /* ── Main ── */
    main {
      max-width: 700px;
      margin: 0 auto;
      padding: 28px 20px 100px;
    }

    /* ── Profile hero ── */
    .profile-hero {
      display: flex;
      align-items: center;
      gap: 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .profile-photo {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      border: 3px solid var(--blue);
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--blue);
    }
    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .hero-info { flex: 1; min-width: 0; }
    .hero-name {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hero-service {
      font-size: 13px;
      color: var(--blue);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .status-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-pending_onboarding { background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); }
    .badge-pending_approval   { background: rgba(0,102,255,0.12);  color: var(--blue);  border: 1px solid rgba(0,102,255,0.25); }
    .badge-active             { background: rgba(0,200,83,0.1);    color: var(--green); border: 1px solid rgba(0,200,83,0.2); }

    /* ── Sections ── */
    .section {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 0 0 14px;
    }

    /* ── Field rows ── */
    .field-row {
      display: flex;
      gap: 12px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }
    .field-row:last-child { border-bottom: none; padding-bottom: 0; }
    .field-row:first-of-type { padding-top: 0; }
    .field-label {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      width: 140px;
      flex-shrink: 0;
      padding-top: 2px;
    }
    .field-value {
      font-size: 14px;
      color: #fff;
      line-height: 1.5;
      word-break: break-word;
      flex: 1;
    }
    .field-value.empty  { color: rgba(255,255,255,0.22); font-style: italic; }
    .field-value.rate   { color: var(--gold); font-weight: 700; }

    /* ── Tags (service cities, additional services) ── */
    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(0,102,255,0.12);
      border: 1px solid rgba(0,102,255,0.2);
      color: rgba(255,255,255,0.85);
    }
    .tag.service {
      background: rgba(255,184,0,0.1);
      border-color: rgba(255,184,0,0.2);
    }

    /* ── Work photos grid ── */
    .work-photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 4px;
    }
    .work-photos-grid img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }

    /* ── Timestamps ── */
    .timestamp-value {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
    }

    /* ── Activate section ── */
    .activate-section {
      margin-top: 28px;
      text-align: center;
    }
    .activate-btn {
      padding: 14px 48px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .activate-btn:hover   { opacity: 0.88; }
    .activate-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .already-active {
      display: inline-block;
      padding: 12px 24px;
      border-radius: 10px;
      background: rgba(0,200,83,0.1);
      border: 1px solid rgba(0,200,83,0.2);
      color: var(--green);
      font-size: 15px;
      font-weight: 700;
    }
    .action-msg {
      margin-top: 12px;
      font-size: 14px;
      color: var(--muted);
      min-height: 20px;
    }
    .action-msg.ok    { color: var(--green); }
    .action-msg.error { color: var(--red); }

    /* ── Loading / error ── */
    .state-msg {
      text-align: center;
      padding: 80px 24px;
      color: var(--muted);
      font-size: 16px;
    }
  </style>
</head>
<body>

  <header>
    <a href="approve.html" class="back">← Pipeline</a>
    <a href="approve.html" class="logo"><span class="task">Task</span><span class="leaders">Leaders</span></a>
    <span class="header-label">/ Profile Review</span>
  </header>

  <main id="main">
    <div class="state-msg" id="stateMsg">Loading profile…</div>
  </main>

  <script src="../js/config.js"></script>
  <script>
    const FUNCTIONS_BASE = (window.TASKLEADERS_FUNCTIONS_BASE || 'https://iwgoafvemlsswkjroyhl.supabase.co/functions/v1').replace(/\/$/, '');
    const APPROVE_URL    = FUNCTIONS_BASE + '/approve-application';

    let adminPw = sessionStorage.getItem('tl_admin_pw') || '';

    /* ── helpers ── */
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function titleCase(str) {
      if (!str) return '';
      return str.replace(/-/g,' ').replace(/\b\w/g, c => c.toUpperCase());
    }

    function fmtDate(iso) {
      if (!iso) return null;
      const d = new Date(iso);
      return isNaN(d) ? iso : d.toLocaleString('en-CA', {
        year:'numeric', month:'short', day:'numeric',
        hour:'2-digit', minute:'2-digit'
      });
    }

    function fmtRate(raw) {
      if (!raw) return null;
      const n = parseFloat(String(raw).replace(/[^0-9.]/g,''));
      return Number.isFinite(n) && n > 0
        ? `$${n % 1 === 0 ? n.toFixed(0) : n.toFixed(2)}/hr`
        : String(raw);
    }

    function fldVal(v, cls) {
      const empty = v === null || v === undefined || v === '' ||
                    (Array.isArray(v) && v.length === 0);
      if (empty) return `<span class="field-value empty">—</span>`;
      return `<span class="field-value${cls ? ' '+cls : ''}">${esc(String(v))}</span>`;
    }

    function row(label, v, cls) {
      return `<div class="field-row">
        <span class="field-label">${esc(label)}</span>
        ${fldVal(v, cls)}
      </div>`;
    }

    function tagList(arr, cls) {
      if (!Array.isArray(arr) || arr.length === 0) return `<span class="field-value empty">—</span>`;
      return `<div class="tag-list">${arr.map(t => `<span class="tag${cls?' '+cls:''}">${esc(t)}</span>`).join('')}</div>`;
    }

    function badgeCls(status) {
      return 'badge-' + (status||'').replace(/[^a-z_]/g,'');
    }
    function badgeLabel(status) {
      return { pending_onboarding:'Pending Onboarding', pending_approval:'Pending Approval', active:'Active' }[status]
        || titleCase(status || 'Unknown');
    }

    function renderServiceRates(rates) {
      if (!rates || typeof rates !== 'object' || Object.keys(rates).length === 0) {
        return `<span class="field-value empty">—</span>`;
      }
      const items = Object.entries(rates).map(([svc, rate]) => {
        const label = svc.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        const n = Number(rate);
        const rateStr = Number.isFinite(n) ? `$${n % 1 === 0 ? n.toFixed(0) : n.toFixed(2)}/hr` : String(rate);
        return `<span class="tag service">${esc(label)}: ${esc(rateStr)}</span>`;
      }).join('');
      return `<div class="tag-list">${items}</div>`;
    }

    function displayNameTypeLabel(v) {
      if (!v) return null;
      if (v === 'full') return 'Full Name (First + Last)';
      if (v === 'first') return 'First Name Only';
      if (v === 'business') return 'Business Name';
      return titleCase(v);
    }

    /* ── load ── */
    async function load() {
      const slug = new URLSearchParams(window.location.search).get('slug')?.trim().toLowerCase();
      if (!slug) { document.getElementById('stateMsg').textContent = 'No provider slug specified.'; return; }

      // Ensure adminPw is available before fetching. When this page is opened directly
      // (bookmarked, linked from email, etc.) rather than navigated from approve.html,
      // sessionStorage is empty and adminPw is ''. Without the password, get-provider
      // applies the suspended=404 gate and deactivated providers appear as not found.
      if (!adminPw) {
        const pw = prompt('Admin password required:');
        if (!pw) { document.getElementById('stateMsg').textContent = 'Password required to view profiles.'; return; }
        adminPw = pw;
        sessionStorage.setItem('tl_admin_pw', pw);
      }

      try {
        // Pass admin_password so get-provider bypasses the suspended=404 gate.
        // Deactivated providers remain viewable in admin review even though their
        // public profile is hidden. Non-admin callers never send this param.
        const pwParam = `&admin_password=${encodeURIComponent(adminPw)}`;
        const res  = await fetch(`${FUNCTIONS_BASE}/get-provider?slug=${encodeURIComponent(slug)}${pwParam}`);
        const json = await res.json().catch(() => null);
        if (!json?.ok || !json.data) { document.getElementById('stateMsg').textContent = 'Provider not found.'; return; }
        render(json.data);
      } catch {
        document.getElementById('stateMsg').textContent = 'Failed to load profile. Please try again.';
      }
    }

    /* ── render ── */
    function render(p) {
      const firstName = p.first_name || '';
      const lastName  = p.last_name  || '';
      const fullName  = [firstName, lastName].filter(Boolean).join(' ') || 'Provider';
      const service   = titleCase(p.primary_service || '');
      const rate      = fmtRate(p.base_rate);

      document.title = `${fullName} — Profile Review`;

      const photoHtml = p.profile_photo
        ? `<div class="profile-photo"><img src="${esc(p.profile_photo)}" alt="${esc(fullName)}" /></div>`
        : `<div class="profile-photo">${esc((firstName||'?')[0].toUpperCase())}</div>`;

      /* ── work photos ── */
      let workPhotosHtml;
      if (Array.isArray(p.work_photos) && p.work_photos.length > 0) {
        const imgs = p.work_photos.map(url =>
          `<img src="${esc(url)}" alt="Work photo" loading="lazy" />`
        ).join('');
        workPhotosHtml = `<div class="work-photos-grid">${imgs}</div>`;
      } else {
        workPhotosHtml = `<span class="field-value empty">No work photos uploaded.</span>`;
      }

      /* ── activate section ── */
      // suspended overrides status — show deactivated notice regardless of underlying status.
      const activateSection = p.suspended
        ? `<div class="activate-section"><span style="color:#ef4444;font-size:14px;font-weight:700;">⚠ Deactivated — public profile and broadcasts suppressed</span></div>`
        : p.status === 'active'
        ? `<div class="activate-section"><span class="already-active">✓ Already Active</span></div>`
        : `<div class="activate-section">
             <button class="activate-btn" id="activateBtn" onclick="activateProvider('${esc(p.slug)}')">Activate Provider</button>
             <div class="action-msg" id="actionMsg"></div>
           </div>`;

      document.getElementById('main').innerHTML = `

        <!-- Hero -->
        <div class="profile-hero">
          ${photoHtml}
          <div class="hero-info">
            <div class="hero-name">${esc(fullName)}</div>
            ${service ? `<div class="hero-service">${esc(service)}</div>` : ''}
            <span class="status-badge ${badgeCls(p.status)}">${badgeLabel(p.status)}</span>
          </div>
        </div>

        <!-- Identity -->
        <div class="section">
          <div class="section-title">Identity</div>
          ${row('First Name',        p.first_name)}
          ${row('Last Name',         p.last_name)}
          ${row('Business Name',     p.business_name)}
          ${row('Display Name Type', displayNameTypeLabel(p.display_name_type))}
        </div>

        <!-- Contact -->
        <div class="section">
          <div class="section-title">Contact</div>
          ${row('Email',        p.email)}
          ${row('WhatsApp',     p.whatsapp_number)}
          ${row('Backup Phone', p.backup_phone)}
        </div>

        <!-- Location -->
        <div class="section">
          <div class="section-title">Location</div>
          ${row('Address Line 1', p.address_line1)}
          ${row('Address Line 2', p.address_line2)}
          ${row('City',           p.city)}
          ${row('Province',       p.province)}
          ${row('Postal Code',    p.postal_code)}
        </div>

        <!-- Coverage -->
        <div class="section">
          <div class="section-title">Service Coverage</div>
          <div class="field-row">
            <span class="field-label">Service Area</span>
            ${fldVal(p.service_area)}
          </div>
          <div class="field-row">
            <span class="field-label">Service Cities</span>
            ${tagList(p.service_cities)}
          </div>
        </div>

        <!-- Services -->
        <div class="section">
          <div class="section-title">Services</div>
          ${row('Primary Service', service || p.primary_service)}
          <div class="field-row">
            <span class="field-label">Additional Services</span>
            ${tagList(p.additional_services, 'service')}
          </div>
          ${row('Base Rate', rate, 'rate')}
          <div class="field-row">
            <span class="field-label">Service Rates</span>
            ${renderServiceRates(p.service_rates)}
          </div>
        </div>

        <!-- Bio -->
        <div class="section">
          <div class="section-title">About / Bio</div>
          ${row('Description', p.short_description)}
        </div>

        <!-- Work Photos -->
        <div class="section">
          <div class="section-title">Work Photos</div>
          ${workPhotosHtml}
        </div>

        <!-- Account -->
        <div class="section">
          <div class="section-title">Account</div>
          ${row('Status',     badgeLabel(p.status))}
          ${row('Submitted',  fmtDate(p.created_at))}
          ${row('Onboarded',  fmtDate(p.onboarded_at))}
        </div>

        ${activateSection}
      `;
    }

    /* ── activate ── */
    async function activateProvider(slug) {
      if (!adminPw) {
        const pw = prompt('Enter admin password to activate:');
        if (!pw) return;
        adminPw = pw;
        sessionStorage.setItem('tl_admin_pw', pw);
      }
      const btn = document.getElementById('activateBtn');
      const msg = document.getElementById('actionMsg');
      btn.disabled = true;
      btn.textContent = 'Activating…';
      msg.className = 'action-msg';
      msg.textContent = '';

      try {
        const res  = await fetch(APPROVE_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'activate', slug, admin_password: adminPw }),
        });
        const json = await res.json().catch(() => null);
        if (!json?.ok) {
          btn.disabled = false;
          btn.textContent = 'Activate Provider';
          msg.className = 'action-msg error';
          msg.textContent = json?.error?.message || 'Activation failed.';
          return;
        }
        const section = document.querySelector('.activate-section');
        section.innerHTML = `
          <span class="already-active">✓ Provider Activated</span>
          <div class="action-msg ok" style="margin-top:8px;">
            ${json.data?.marketplace_synced
              ? 'Activated and synced to marketplace.'
              : 'Activated. (Marketplace sync skipped — check city/category slug.)'}
          </div>`;
      } catch {
        btn.disabled = false;
        btn.textContent = 'Activate Provider';
        msg.className = 'action-msg error';
        msg.textContent = 'Network error. Please try again.';
      }
    }

    load();
  </script>
</body>
</html>
