<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — TaskLeaders</title>
  <style>
    :root {
      --blue: #0066ff;
      --blue-dark: #0052cc;
      --green: #00c853;
      --gold: #ffb800;
      --amber: #f59e0b;
      --red: #ff4d4d;
      --bg: #0a0a14;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.55);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Auth gate ── */
    #auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .auth-logo {
      font-size: 28px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }
    .auth-logo .task    { color: var(--blue); }
    .auth-logo .leaders { color: #fff; }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
    }
    .auth-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
      color: #fff;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--blue); }
    .auth-error {
      font-size: 13px;
      color: var(--red);
      margin-bottom: 10px;
      display: none;
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-btn:hover { background: var(--blue-dark); }

    /* ── App ── */
    #app { display: none; }

    /* ── Header ── */
    header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo .task    { color: var(--blue); }
    .logo .leaders { color: #fff; }
    .admin-badge {
      background: rgba(255,184,0,0.15);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sign-out-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted);
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .sign-out-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    /* ── Main layout ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    .page-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .page-title .task { color: var(--blue); }
    .page-sub {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 32px;
    }

    /* ── Section headings ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      flex-wrap: wrap;
      gap: 8px;
    }
    .section-title { font-size: 16px; font-weight: 700; }
    .section-count { font-size: 13px; color: var(--muted); }
    .section-divider { margin-top: 52px; }

    /* ── Refresh btn ── */
    .refresh-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Filter tabs ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }
    .filter-tab {
      padding: 5px 13px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-tab:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
    .filter-tab.active { background: var(--blue); border-color: var(--blue); color: #fff; }

    /* ── Search input ── */
    .search-input {
      width: 100%;
      padding: 9px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: #fff;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      margin-bottom: 14px;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: rgba(255,255,255,0.25); }

    /* ── Loading / empty states ── */
    .loading-row {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 15px;
    }
    .empty-row {
      text-align: center;
      padding: 28px 20px;
      color: var(--muted);
      font-size: 15px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* ── Application cards (Onboarding Queue) ── */
    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .app-card:hover { border-color: rgba(255,255,255,0.15); }
    .app-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .app-name { font-size: 17px; font-weight: 700; }
    .app-business { font-size: 15px; color: rgba(255,255,255,0.65); margin-top: 2px; }
    .app-date { font-size: 14px; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
    .app-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .app-tag {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.75);
      font-weight: 500;
    }
    .app-tag.service { background: rgba(0,102,255,0.15); color: var(--blue); }
    .app-desc { font-size: 15px; color: rgba(255,255,255,0.75); line-height: 1.5; margin-bottom: 16px; }
    .approve-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .approve-btn:hover { background: #00a844; }
    .approve-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Expand / collapse (Queue cards) ── */
    .app-card-summary { cursor: pointer; user-select: none; }
    .app-card-summary:hover .app-name { color: rgba(255,255,255,0.85); }
    .expand-toggle { font-size: 12px; color: var(--blue); font-weight: 600; margin-top: 6px; display: inline-block; }
    .app-card-detail { display: none; border-top: 1px solid var(--border); margin-top: 14px; padding-top: 14px; }
    .app-card-detail.open { display: block; }
    .detail-row { display: flex; gap: 8px; margin-bottom: 10px; font-size: 14px; line-height: 1.4; }
    .detail-label { color: var(--muted); font-weight: 600; flex-shrink: 0; min-width: 110px; }
    .detail-value { color: #fff; }

    /* ── Status badges ── */
    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      text-align: center;
      white-space: nowrap;
    }
    .status-badge.in-progress { background: rgba(0,102,255,0.18); color: var(--blue); }
    .status-badge.pending-approval { background: rgba(245,158,11,0.18); color: var(--amber); }
    .status-badge.active { background: rgba(0,200,83,0.15); color: var(--green); }
    .status-badge.pending { background: rgba(255,184,0,0.15); color: var(--gold); }

    /* ── Pipeline section ── */
    .pipeline-section { margin-top: 48px; }

    /* ── Pipeline cards ── */
    .pipe-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .pipe-card:hover { border-color: rgba(255,255,255,0.15); }
    .pipe-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
    }
    .pipe-card-main { flex: 1; min-width: 0; }
    .pipe-name { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .pipe-col {
      font-size: 13px;
      color: rgba(255,255,255,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }
    .pipe-col-service { width: 100px; }
    .pipe-col-area    { width: 90px; }
    .pipe-col-email   { width: 160px; }
    .pipe-col-wa      { width: 120px; }
    .pipe-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
    .pipe-chevron { font-size: 11px; color: rgba(255,255,255,0.3); transition: transform 0.2s; line-height: 1; }
    .pipe-card.open .pipe-chevron { transform: rotate(180deg); }

    /* ── Pipeline action buttons ── */
    .action-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .resend-btn {
      background: rgba(0,102,255,0.15);
      color: var(--blue);
      border: 1px solid rgba(0,102,255,0.3);
    }
    .resend-btn:hover { background: rgba(0,102,255,0.25); }
    .resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .activate-btn {
      background: rgba(0,200,83,0.12);
      color: var(--green);
      border: 1px solid rgba(0,200,83,0.3);
    }
    .activate-btn:hover { background: rgba(0,200,83,0.22); }
    .activate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Pipeline detail panel ── */
    .pipe-detail { display: none; border-top: 1px solid var(--border); padding: 16px 20px 18px; }
    .pipe-card.open .pipe-detail { display: block; }

    /* ── Link result box ── */
    .link-result {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      background: rgba(0,200,83,0.08);
      border: 1px solid rgba(0,200,83,0.25);
      border-radius: 10px;
    }
    .link-result-label { font-size: 12px; font-weight: 700; color: var(--green); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .link-result-url {
      font-size: 14px;
      color: #fff;
      word-break: break-all;
      margin-bottom: 10px;
      font-family: 'Courier New', monospace;
      background: rgba(255,255,255,0.05);
      padding: 8px 12px;
      border-radius: 6px;
    }
    .copy-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: var(--blue-dark); }
    .copy-btn.copied { background: var(--green); }

    /* ── Concierge Queue section ── */
    .concierge-section { margin-top: 52px; }
    .concierge-table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); }
    .concierge-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 700px;
    }
    .concierge-table th {
      text-align: left;
      padding: 10px 14px;
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .concierge-table td {
      padding: 12px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.82);
      vertical-align: middle;
    }
    .concierge-table tr:last-child td { border-bottom: none; }
    .concierge-table tbody tr:hover td { background: rgba(255,255,255,0.02); }
    .concierge-name { font-weight: 600; color: #fff; }
    .concierge-muted { color: var(--muted); font-size: 12px; }
    .concierge-approve-btn {
      padding: 5px 13px;
      border-radius: 7px;
      background: rgba(0,200,83,0.12);
      color: var(--green);
      border: 1px solid rgba(0,200,83,0.3);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .concierge-approve-btn:hover { background: rgba(0,200,83,0.22); }
    .concierge-approve-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    @media (max-width: 700px) {
      .pipe-col-email, .pipe-col-wa { display: none; }
      .page-title { font-size: 22px; }
    }
    @media (max-width: 500px) {
      .pipe-col-area { display: none; }
    }
  </style>
</head>
<body>

  <!-- Auth gate -->
  <div id="auth-gate">
    <div class="auth-logo"><span class="task">Task</span><span class="leaders">Leaders</span></div>
    <div class="auth-card">
      <div class="auth-title">Admin Access</div>
      <div class="auth-sub">Enter your admin password to continue.</div>
      <div class="auth-error" id="authError">Incorrect password. Try again.</div>
      <input
        type="password"
        class="auth-input"
        id="passwordInput"
        placeholder="Admin password"
        onkeydown="if(event.key==='Enter')submitAuth()"
      />
      <button class="auth-btn" onclick="submitAuth()">Sign In</button>
    </div>
  </div>

  <!-- App (shown after auth) -->
  <div id="app">
    <header>
      <a href="../homepage.html" class="logo"><span class="task">Task</span><span class="leaders">Leaders</span></a>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="admin-badge">Admin</span>
        <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
      </div>
    </header>

    <main>
      <div class="page-title"><span class="task">Task</span>Leader Admin</div>
      <p class="page-sub">Approve applications, generate welcome links, and activate TaskLeaders.</p>

      <!-- ── Onboarding Queue ── -->
      <div class="section-head">
        <div class="section-title">Onboarding Queue</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="section-count" id="pendingCount"></span>
          <button class="refresh-btn" onclick="loadData()">Refresh</button>
        </div>
      </div>
      <div id="pendingList"><div class="loading-row">Loading…</div></div>

      <!-- ── TaskLeader Pipeline ── -->
      <div class="pipeline-section section-divider">
        <div class="section-head">
          <div class="section-title">TaskLeader Pipeline</div>
          <span class="section-count" id="pipelineCount"></span>
        </div>

        <!-- Filter tabs -->
        <div class="filter-bar" id="pipelineFilterBar">
          <button class="filter-tab active" data-filter="all"              onclick="setPipelineFilter(this)">All</button>
          <button class="filter-tab"         data-filter="in_progress"     onclick="setPipelineFilter(this)">In Progress</button>
          <button class="filter-tab"         data-filter="pending_approval" onclick="setPipelineFilter(this)">Pending Approval</button>
          <button class="filter-tab"         data-filter="active"          onclick="setPipelineFilter(this)">Active</button>
        </div>

        <!-- Search -->
        <input
          type="text"
          class="search-input"
          id="pipelineSearch"
          placeholder="Search by name…"
          oninput="applyPipelineFilters()"
        />

        <div id="pipelineList"><div class="loading-row">Loading…</div></div>
      </div>

      <!-- ── Concierge Queue ── -->
      <div class="concierge-section section-divider">
        <div class="section-head">
          <div class="section-title">Concierge Queue</div>
          <span class="section-count" id="conciergeCount"></span>
        </div>

        <!-- Filter tabs -->
        <div class="filter-bar" id="conciergeFilterBar">
          <button class="filter-tab active" data-filter="all"     onclick="setConciergeFilter(this)">All</button>
          <button class="filter-tab"        data-filter="pending" onclick="setConciergeFilter(this)">Pending</button>
          <button class="filter-tab"        data-filter="active"  onclick="setConciergeFilter(this)">Active</button>
        </div>

        <!-- Search -->
        <input
          type="text"
          class="search-input"
          id="conciergeSearch"
          placeholder="Search by name…"
          oninput="applyConciergeFilters()"
        />

        <div id="conciergeList"><div class="loading-row">Loading…</div></div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script>
    const SESSION_KEY = 'tl_admin_pw';
    let adminPw = '';

    // Module-level data stores for client-side filtering
    let allProviders       = [];
    let allConciergeClients = [];
    let pipelineFilter     = 'all';
    let conciergeFilter    = 'all';

    // Canonical category display names
    const CATEGORY_LABELS = {
      handyman:    'Handyman',
      cleaning:    'Cleaning',
      painting:    'Painting',
      electrical:  'Electrical',
      plumbing:    'Plumbing',
      'yard-work': 'Yard Work',
      hvac:        'HVAC',
      moving:      'Moving / Transport',
    };
    function categoryLabel(slug) {
      return CATEGORY_LABELS[String(slug || '').toLowerCase()] || slug || '';
    }

    // ── Auth ────────────────────────────────────────────────────────────────
    function submitAuth() {
      const pw = document.getElementById('passwordInput').value;
      if (!pw) return;
      adminPw = pw;
      sessionStorage.setItem(SESSION_KEY, pw);
      loadData();
    }

    function signOut() {
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById('app').style.display = 'none';
      document.getElementById('auth-gate').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
      adminPw = '';
    }

    function showApp() {
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    function showAuthError() {
      const el = document.getElementById('authError');
      el.style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
      adminPw = '';
      sessionStorage.removeItem(SESSION_KEY);
    }

    // ── Data loading ────────────────────────────────────────────────────────
    async function loadData() {
      const base = window.TASKLEADERS_FUNCTIONS_BASE;
      if (!base) {
        document.getElementById('pendingList').innerHTML =
          '<div class="empty-row">Site configuration missing. Check js/config.js.</div>';
        return;
      }

      try {
        const res  = await fetch(
          `${base.replace(/\/$/, '')}/approve-application?admin_password=${encodeURIComponent(adminPw)}`
        );
        const data = await res.json().catch(() => null);

        if (res.status === 401 || data?.error?.code === 'unauthorized') {
          showAuthError();
          return;
        }

        if (!data || data.ok !== true) throw new Error(data?.error?.message || 'Failed to load data');

        showApp();
        renderPending(data.data.pending           || []);
        renderPipeline(data.data.approved         || []);
        renderConciergeQueue(data.data.concierge_clients || []);

      } catch (err) {
        document.getElementById('pendingList').innerHTML =
          `<div class="empty-row">Error loading data: ${escHtml(err.message)}</div>`;
      }
    }

    async function loadPipelineOnly() {
      const base = window.TASKLEADERS_FUNCTIONS_BASE;
      try {
        const res  = await fetch(`${base.replace(/\/$/, '')}/approve-application?admin_password=${encodeURIComponent(adminPw)}`);
        const data = await res.json().catch(() => null);
        if (data?.ok) renderPipeline(data.data.approved || []);
      } catch {}
    }

    // ── Render Onboarding Queue ─────────────────────────────────────────────
    function renderPending(apps) {
      const el    = document.getElementById('pendingList');
      const count = document.getElementById('pendingCount');
      count.textContent = `${apps.length} application${apps.length !== 1 ? 's' : ''}`;

      if (apps.length === 0) {
        el.innerHTML = '<div class="empty-row">No pending applications.</div>';
        return;
      }

      el.innerHTML = apps.map(app => {
        const date    = new Date(app.created_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
        const service = categoryLabel(app.category_slug);
        return `
        <div class="app-card" id="card-${app.id}">
          <div class="app-card-summary" onclick="toggleDetail('${app.id}')">
            <div class="app-card-top">
              <div>
                <div class="app-name">${escHtml(app.contact_name || '')}</div>
                ${app.business_name ? `<div class="app-business">${escHtml(app.business_name)}</div>` : ''}
              </div>
              <div class="app-date">${date}</div>
            </div>
            <div class="app-meta">
              ${service ? `<span class="app-tag service">${escHtml(service)}</span>` : ''}
              ${app.service_area ? `<span class="app-tag">${escHtml(toTitleCase(app.service_area))}</span>` : ''}
            </div>
            <span class="expand-toggle" id="toggle-${app.id}">View full application ▾</span>
          </div>
          <div class="app-card-detail" id="detail-${app.id}">
            <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escHtml(app.email || '')}</span></div>
            <div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">${escHtml(app.whatsapp_e164 || '')}</span></div>
            ${app.description ? `<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">${escHtml(app.description)}</span></div>` : ''}
            <div style="margin-top:16px;">
              <button class="approve-btn" id="btn-${app.id}" onclick="approveApp('${app.id}', this)">
                Approve &amp; Generate Link
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // ── Render TaskLeader Pipeline ──────────────────────────────────────────
    function renderPipeline(providers) {
      allProviders = providers;
      applyPipelineFilters();
    }

    function setPipelineFilter(btn) {
      document.querySelectorAll('#pipelineFilterBar .filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      pipelineFilter = btn.dataset.filter;
      applyPipelineFilters();
    }

    function toTitleCase(str) {
      return String(str || '').replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
    }

    function applyPipelineFilters() {
      const q      = (document.getElementById('pipelineSearch')?.value || '').toLowerCase().trim();
      const limit  = (pipelineFilter === 'all' && !q) ? 10 : Infinity;
      let filtered = allProviders;

      // Status filter — 10-record cap applies to "All" only; specific filters show all matches
      // "In Progress" = everything that is not active and not pending_approval (includes pending_onboarding)
      if (pipelineFilter === 'in_progress') {
        filtered = filtered.filter(p => p.status !== 'active' && p.status !== 'pending_approval');
      } else if (pipelineFilter === 'pending_approval') {
        filtered = filtered.filter(p => p.status === 'pending_approval');
      } else if (pipelineFilter === 'active') {
        filtered = filtered.filter(p => p.status === 'active');
      }

      // Search filter — name, service, area, whatsapp
      if (q) {
        filtered = filtered.filter(p =>
          `${p.first_name || ''} ${p.last_name || ''}`.toLowerCase().includes(q) ||
          (p.email || '').toLowerCase().includes(q) ||
          categoryLabel(p.primary_service || '').toLowerCase().includes(q) ||
          (p.service_area || '').toLowerCase().includes(q) ||
          (p.whatsapp_number || '').toLowerCase().includes(q)
        );
      }

      const visible = filtered.slice(0, limit);
      renderPipelineCards(visible, filtered.length, allProviders.length);
    }

    function renderPipelineCards(providers, filteredTotal, total) {
      const el    = document.getElementById('pipelineList');
      const count = document.getElementById('pipelineCount');
      count.textContent = pipelineFilter === 'all' && !document.getElementById('pipelineSearch')?.value
        ? `${total} record${total !== 1 ? 's' : ''} — showing ${Math.min(10, total)} most recent`
        : `${filteredTotal} record${filteredTotal !== 1 ? 's' : ''}`;

      if (providers.length === 0) {
        el.innerHTML = '<div class="empty-row">No records match the current filter.</div>';
        return;
      }

      el.innerHTML = providers.map(p => {
        const { cls, label } = pipelineStatus(p.status);
        const actionBtn = p.status === 'pending_onboarding'
          ? `<button class="action-btn resend-btn" onclick="event.stopPropagation();resendLink('${escHtml(p.slug)}',this)" title="Show welcome link">Resend Link</button>`
          : p.status === 'pending_approval'
          ? `<button class="action-btn activate-btn" onclick="event.stopPropagation();activateProvider('${escHtml(p.slug)}',this)" title="Activate TaskLeader">Activate</button>`
          : '';
        const welcomeUrl = `https://task-leaders.com/v0.5/welcome.html?slug=${escHtml(p.slug)}`;

        return `
        <div class="pipe-card" id="pipe-${p.slug}">
          <div class="pipe-card-top" onclick="togglePipelineDetail('${escHtml(p.slug)}')">
            <div class="pipe-card-main">
              <div class="pipe-name">${escHtml(p.first_name || '')} ${escHtml(p.last_name || '')}</div>
            </div>
            <div class="pipe-col pipe-col-service">${escHtml(categoryLabel(p.primary_service || ''))}</div>
            <div class="pipe-col pipe-col-area">${escHtml(toTitleCase(p.service_area || ''))}</div>
            <div class="pipe-col pipe-col-email">${escHtml(p.email || '')}</div>
            <div class="pipe-col pipe-col-wa">${escHtml(p.whatsapp_number || '')}</div>
            <div class="pipe-right">
              <span class="status-badge ${cls}">${label}</span>
              ${actionBtn}
              <span class="pipe-chevron">▾</span>
            </div>
          </div>
          <div class="pipe-detail" id="pdetail-${p.slug}">
            ${p.email           ? `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escHtml(p.email)}</span></div>` : ''}
            ${p.whatsapp_number ? `<div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">${escHtml(p.whatsapp_number)}</span></div>` : ''}
            ${p.business_name   ? `<div class="detail-row"><span class="detail-label">Business</span><span class="detail-value">${escHtml(p.business_name)}</span></div>` : ''}
            ${p.service_area    ? `<div class="detail-row"><span class="detail-label">Service area</span><span class="detail-value">${escHtml(p.service_area)}</span></div>` : ''}
            ${p.primary_service ? `<div class="detail-row"><span class="detail-label">Service</span><span class="detail-value">${escHtml(categoryLabel(p.primary_service))}</span></div>` : ''}
            ${p.short_description ? `<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">${escHtml(p.short_description)}</span></div>` : ''}
            <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap;">
              <a href="profile-review.html?slug=${escHtml(p.slug)}" target="_blank" class="action-btn resend-btn" style="text-decoration:none;display:inline-block;">View Full Profile ↗</a>
              ${p.status === 'active' ? `<a href="../profile.html?slug=${escHtml(p.slug)}" target="_blank" class="action-btn resend-btn" style="text-decoration:none;display:inline-block;">View Public Profile ↗</a>` : ''}
            </div>
            ${p.status === 'pending_onboarding' ? `
            <div class="link-result" id="resend-panel-${p.slug}" style="display:block;margin-top:12px;">
              <div class="link-result-label">Welcome link</div>
              <div class="link-result-url" id="resend-url-${p.slug}">${welcomeUrl}</div>
              <button class="copy-btn" id="resend-copy-${p.slug}" onclick="copyText('resend-url-${p.slug}','resend-copy-${p.slug}')">Copy Link</button>
            </div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function pipelineStatus(status) {
      if (status === 'active')           return { cls: 'active',           label: 'Active' };
      if (status === 'pending_approval') return { cls: 'pending-approval', label: 'Pending Approval' };
      return { cls: 'in-progress', label: 'In Progress' };
    }

    // ── Render Concierge Queue ──────────────────────────────────────────────
    function renderConciergeQueue(clients) {
      allConciergeClients = clients;
      applyConciergeFilters();
    }

    function setConciergeFilter(btn) {
      document.querySelectorAll('#conciergeFilterBar .filter-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      conciergeFilter = btn.dataset.filter;
      applyConciergeFilters();
    }

    function applyConciergeFilters() {
      const q      = (document.getElementById('conciergeSearch')?.value || '').toLowerCase().trim();
      const limit  = (conciergeFilter === 'all' && !q) ? 10 : Infinity;
      let filtered = allConciergeClients;

      if (conciergeFilter === 'pending') {
        filtered = filtered.filter(c => c.status === 'pending');
      } else if (conciergeFilter === 'active') {
        filtered = filtered.filter(c => c.status === 'active');
      }

      if (q) {
        filtered = filtered.filter(c => {
          const fullName = (`${c.first_name || ''} ${c.last_name || ''}`).trim() || (c.name || '');
          return fullName.toLowerCase().includes(q) || (c.email || '').toLowerCase().includes(q);
        });
      }

      const visible = filtered.slice(0, limit);
      renderConciergeTable(visible, filtered.length, allConciergeClients.length);
    }

    function renderConciergeTable(clients, filteredTotal, total) {
      const el    = document.getElementById('conciergeList');
      const count = document.getElementById('conciergeCount');
      count.textContent = conciergeFilter === 'all' && !document.getElementById('conciergeSearch')?.value
        ? `${total} record${total !== 1 ? 's' : ''} — showing ${Math.min(10, total)} most recent`
        : `${filteredTotal} record${filteredTotal !== 1 ? 's' : ''}`;

      if (clients.length === 0) {
        el.innerHTML = '<div class="empty-row">No concierge clients match the current filter.</div>';
        return;
      }

      const rows = clients.map(c => {
        const date       = new Date(c.created_at).toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
        const displayName = (`${c.first_name || ''} ${c.last_name || ''}`).trim() || (c.name || '');
        const statusBadge = c.status === 'active'
          ? `<span class="status-badge active">Active</span>`
          : `<span class="status-badge pending">Pending</span>`;
        const approveBtn  = c.status !== 'active'
          ? `<button class="concierge-approve-btn" id="cbtn-${c.id}" onclick="approveConciergeClient('${escHtml(c.id)}',this)">Approve</button>`
          : '';

        return `<tr>
          <td><div class="concierge-name">${escHtml(displayName)}</div></td>
          <td>${escHtml(c.role || '—')}</td>
          <td>${escHtml(c.company || '—')}</td>
          <td>${escHtml(c.email || '')}</td>
          <td>${escHtml(c.whatsapp || '')}</td>
          <td><span class="concierge-muted">${date}</span></td>
          <td>${statusBadge}</td>
          <td>${approveBtn}</td>
        </tr>`;
      }).join('');

      el.innerHTML = `
        <div class="concierge-table-wrap">
          <table class="concierge-table">
            <thead>
              <tr>
                <th>Name</th>
                <th>Role</th>
                <th>Company / Brokerage</th>
                <th>Email</th>
                <th>WhatsApp</th>
                <th>Date Submitted</th>
                <th>Status</th>
                <th></th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // ── Toggle pipeline detail ───────────────────────────────────────────────
    function togglePipelineDetail(slug) {
      const card = document.getElementById(`pipe-${slug}`);
      if (card) card.classList.toggle('open');
    }

    // ── Toggle queue card detail ─────────────────────────────────────────────
    function toggleDetail(appId) {
      const detail = document.getElementById(`detail-${appId}`);
      const toggle = document.getElementById(`toggle-${appId}`);
      const isOpen = detail.classList.contains('open');
      detail.classList.toggle('open', !isOpen);
      toggle.textContent = isOpen ? 'View full application ▾' : 'Hide details ▴';
    }

    // ── Approve an application ───────────────────────────────────────────────
    async function approveApp(applicationId, btn) {
      btn.disabled = true;
      btn.textContent = 'Approving…';
      const base = window.TASKLEADERS_FUNCTIONS_BASE;
      try {
        const res  = await fetch(`${base.replace(/\/$/, '')}/approve-application`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ application_id: applicationId, admin_password: adminPw }),
        });
        const data = await res.json().catch(() => null);
        if (!data || data.ok !== true) {
          btn.disabled = false;
          btn.textContent = 'Approve & Generate Link';
          alert(data?.error?.message || 'Failed to approve application.');
          return;
        }
        const welcomeUrl = `https://task-leaders.com/v0.5/welcome.html?slug=${data.data.slug}`;
        btn.style.display = 'none';
        const detail  = document.getElementById(`detail-${applicationId}`);
        const linkDiv = document.createElement('div');
        linkDiv.className = 'link-result';
        linkDiv.style.display = 'block';
        linkDiv.innerHTML = `
          <div class="link-result-label">Welcome link — send this to the TaskLeader</div>
          <div class="link-result-url" id="ql-url-${applicationId}">${escHtml(welcomeUrl)}</div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
            <button class="copy-btn" id="ql-copy-${applicationId}" onclick="copyText('ql-url-${applicationId}','ql-copy-${applicationId}')">Copy Link</button>
            <button class="copy-btn" style="background:rgba(255,255,255,0.1);" onclick="loadData()">Done — Move to Pipeline</button>
          </div>`;
        detail.appendChild(linkDiv);
      } catch {
        btn.disabled = false;
        btn.textContent = 'Approve & Generate Link';
        alert('Network error. Please try again.');
      }
    }

    // ── Resend link ──────────────────────────────────────────────────────────
    function resendLink(slug) {
      const card = document.getElementById(`pipe-${slug}`);
      if (card && !card.classList.contains('open')) card.classList.add('open');
    }

    // ── Activate TaskLeader ──────────────────────────────────────────────────
    async function activateProvider(slug, btn) {
      btn.disabled = true;
      btn.textContent = 'Activating…';
      const base = window.TASKLEADERS_FUNCTIONS_BASE;
      try {
        const res  = await fetch(`${base.replace(/\/$/, '')}/approve-application`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ action: 'activate', slug, admin_password: adminPw }),
        });
        const data = await res.json().catch(() => null);
        if (!data || data.ok !== true) {
          btn.disabled = false;
          btn.textContent = 'Activate';
          alert(data?.error?.message || 'Failed to activate TaskLeader.');
          return;
        }
        btn.textContent = 'Activated ✓';
        // Welcome email is sent server-side by the activate action.
        // TODO: WhatsApp welcome message to be wired during Twilio integration.
        //       Operator should send this manually in the interim.
        setTimeout(() => loadPipelineOnly(), 800);
      } catch {
        btn.disabled = false;
        btn.textContent = 'Activate';
        alert('Network error. Please try again.');
      }
    }

    // ── Approve Concierge Client ─────────────────────────────────────────────
    async function approveConciergeClient(clientId, btn) {
      btn.disabled = true;
      btn.textContent = 'Approving…';
      const base = window.TASKLEADERS_FUNCTIONS_BASE;
      try {
        const res  = await fetch(`${base.replace(/\/$/, '')}/approve-application`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ action: 'approve_concierge_client', client_id: clientId, admin_password: adminPw }),
        });
        const data = await res.json().catch(() => null);
        if (!data || data.ok !== true) {
          btn.disabled = false;
          btn.textContent = 'Approve';
          alert(data?.error?.message || 'Failed to approve client.');
          return;
        }
        btn.textContent = 'Approved ✓';
        // Welcome email is sent server-side.
        // TODO: WhatsApp welcome message to be wired during Twilio integration.
        //       Operator should send this manually in the interim.
        setTimeout(() => applyConciergeFilters(), 800);
        // Update local state so the button swaps to Active badge without reload
        const rec = allConciergeClients.find(c => c.id === clientId);
        if (rec) { rec.status = 'active'; rec.approved_date = new Date().toISOString(); }
      } catch {
        btn.disabled = false;
        btn.textContent = 'Approve';
        alert('Network error. Please try again.');
      }
    }

    // ── Copy text from element ───────────────────────────────────────────────
    function copyText(sourceId, btnId) {
      const text = document.getElementById(sourceId).textContent.trim();
      const btn  = document.getElementById(btnId);

      function markCopied() {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy Link'; btn.classList.remove('copied'); }, 2000);
      }

      function fallbackCopy() {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0;pointer-events:none;';
        document.body.appendChild(ta);
        ta.focus();
        ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
        markCopied();
      }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(markCopied).catch(fallbackCopy);
      } else {
        fallbackCopy();
      }
    }

    // ── Utilities ────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    const savedPw = sessionStorage.getItem(SESSION_KEY);
    if (savedPw) {
      adminPw = savedPw;
      loadData();
    }
  </script>
</body>
</html>
