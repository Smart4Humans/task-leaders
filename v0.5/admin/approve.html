<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — TaskLeaders</title>
  <style>
    :root {
      --blue: #0066ff;
      --blue-dark: #0052cc;
      --green: #00c853;
      --gold: #ffb800;
      --amber: #f59e0b;
      --red: #ff4d4d;
      --bg: #0a0a14;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.55);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Auth gate ── */
    #auth-gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px;
    }
    .auth-logo {
      font-size: 28px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
      margin-bottom: 32px;
    }
    .auth-logo .task    { color: var(--blue); }
    .auth-logo .leaders { color: #fff; }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
    }
    .auth-title {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .auth-sub {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
      color: #fff;
      font-size: 15px;
      outline: none;
      font-family: inherit;
      margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--blue); }
    .auth-error {
      font-size: 13px;
      color: var(--red);
      margin-bottom: 10px;
      display: none;
    }
    .auth-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .auth-btn:hover { background: var(--blue-dark); }

    /* ── App ── */
    #app { display: none; }

    /* ── Header ── */
    header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .logo {
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo .task    { color: var(--blue); }
    .logo .leaders { color: #fff; }
    .admin-badge {
      background: rgba(255,184,0,0.15);
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .sign-out-btn {
      background: none;
      border: 1px solid rgba(255,255,255,0.15);
      color: var(--muted);
      font-size: 13px;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .sign-out-btn:hover { color: #fff; border-color: rgba(255,255,255,0.3); }

    /* ── Main layout ── */
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }
    .page-title {
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .page-sub {
      font-size: 16px;
      color: #fff;
      margin-bottom: 32px;
    }

    /* ── Section headings ── */
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 700;
    }
    .section-count {
      font-size: 15px;
      color: #fff;
    }

    /* ── Refresh btn ── */
    .refresh-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: rgba(255,255,255,0.7);
      font-size: 13px;
      font-weight: 600;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .refresh-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── Loading / empty states ── */
    .loading-row {
      text-align: center;
      padding: 40px 20px;
      color: #fff;
      font-size: 16px;
    }
    .empty-row {
      text-align: center;
      padding: 32px 20px;
      color: #fff;
      font-size: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    /* ── Application cards (Onboarding Queue) ── */
    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 12px;
      transition: border-color 0.15s;
    }
    .app-card:hover { border-color: rgba(255,255,255,0.15); }
    .app-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }
    .app-name {
      font-size: 17px;
      font-weight: 700;
    }
    .app-business {
      font-size: 15px;
      color: #fff;
      margin-top: 2px;
    }
    .app-date {
      font-size: 14px;
      color: #fff;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .app-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }
    .app-tag {
      font-size: 13px;
      padding: 4px 10px;
      border-radius: 6px;
      background: rgba(255,255,255,0.06);
      color: #fff;
      font-weight: 500;
    }
    .app-tag.service {
      background: rgba(0,102,255,0.15);
      color: var(--blue);
    }
    .app-desc {
      font-size: 15px;
      color: #fff;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    .approve-btn {
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      background: var(--green);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .approve-btn:hover { background: #00a844; }
    .approve-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Expand / collapse (Queue cards) ── */
    .app-card-summary {
      cursor: pointer;
      user-select: none;
    }
    .app-card-summary:hover .app-name { color: rgba(255,255,255,0.85); }
    .expand-toggle {
      font-size: 12px;
      color: var(--blue);
      font-weight: 600;
      margin-top: 6px;
      display: inline-block;
    }
    .app-card-detail {
      display: none;
      border-top: 1px solid var(--border);
      margin-top: 14px;
      padding-top: 14px;
    }
    .app-card-detail.open { display: block; }
    .detail-row {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 14px;
      line-height: 1.4;
    }
    .detail-label {
      color: rgba(255,255,255,0.5);
      font-weight: 600;
      flex-shrink: 0;
      min-width: 110px;
    }
    .detail-value { color: #fff; }

    /* ── Status badges ── */
    .status-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 5px;
      text-align: center;
      white-space: nowrap;
    }
    .status-badge.in-progress {
      background: rgba(0,102,255,0.18);
      color: var(--blue);
    }
    .status-badge.pending-approval {
      background: rgba(245,158,11,0.18);
      color: var(--amber);
    }
    .status-badge.active {
      background: rgba(0,200,83,0.15);
      color: var(--green);
    }

    /* ── Pipeline section ── */
    .pipeline-section { margin-top: 48px; }

    /* ── Pipeline cards ── */
    .pipe-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 8px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .pipe-card:hover { border-color: rgba(255,255,255,0.15); }
    .pipe-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 20px;
      cursor: pointer;
      user-select: none;
    }
    .pipe-card-main {
      flex: 1;
      min-width: 0;
    }
    .pipe-name {
      font-size: 15px;
      font-weight: 700;
    }
    .pipe-slug {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      font-family: 'Courier New', monospace;
      margin-top: 2px;
    }
    .pipe-email {
      font-size: 14px;
      color: rgba(255,255,255,0.65);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pipe-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .pipe-chevron {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      transition: transform 0.2s;
      line-height: 1;
    }
    .pipe-card.open .pipe-chevron { transform: rotate(180deg); }

    /* ── Pipeline action buttons ── */
    .action-btn {
      padding: 6px 14px;
      border-radius: 8px;
      border: none;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .resend-btn {
      background: rgba(0,102,255,0.15);
      color: var(--blue);
      border: 1px solid rgba(0,102,255,0.3);
    }
    .resend-btn:hover { background: rgba(0,102,255,0.25); }
    .resend-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .activate-btn {
      background: rgba(0,200,83,0.12);
      color: var(--green);
      border: 1px solid rgba(0,200,83,0.3);
    }
    .activate-btn:hover { background: rgba(0,200,83,0.22); }
    .activate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Pipeline detail panel ── */
    .pipe-detail {
      display: none;
      border-top: 1px solid var(--border);
      padding: 16px 20px 18px;
    }
    .pipe-card.open .pipe-detail { display: block; }

    /* ── Link result box (reused in Queue & Pipeline) ── */
    .link-result {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      background: rgba(0,200,83,0.08);
      border: 1px solid rgba(0,200,83,0.25);
      border-radius: 10px;
    }
    .link-result-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .link-result-url {
      font-size: 14px;
      color: #fff;
      word-break: break-all;
      margin-bottom: 10px;
      font-family: 'Courier New', monospace;
      background: rgba(255,255,255,0.05);
      padding: 8px 12px;
      border-radius: 6px;
    }
    .copy-btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .copy-btn:hover { background: var(--blue-dark); }
    .copy-btn.copied { background: var(--green); }

    @media (max-width: 560px) {
      .pipe-email { display: none; }
    }
  </style>
</head>
<body>

  <!-- Auth gate -->
  <div id="auth-gate">
    <div class="auth-logo"><span class="task">Task</span><span class="leaders">Leaders</span></div>
    <div class="auth-card">
      <div class="auth-title">Admin Access</div>
      <div class="auth-sub">Enter your admin password to continue.</div>
      <div class="auth-error" id="authError">Incorrect password. Try again.</div>
      <input
        type="password"
        class="auth-input"
        id="passwordInput"
        placeholder="Admin password"
        onkeydown="if(event.key==='Enter')submitAuth()"
      />
      <button class="auth-btn" onclick="submitAuth()">Sign In</button>
    </div>
  </div>

  <!-- App (shown after auth) -->
  <div id="app">
    <header>
      <a href="../homepage.html" class="logo"><span class="task">Task</span><span class="leaders">Leaders</span></a>
      <div style="display:flex;align-items:center;gap:12px;">
        <span class="admin-badge">Admin</span>
        <button class="sign-out-btn" onclick="signOut()">Sign Out</button>
      </div>
    </header>

    <main>
      <div class="page-title">TaskLeader Admin</div>
      <p class="page-sub">Approve applications, generate welcome links, and activate providers.</p>

      <!-- Onboarding Queue -->
      <div class="section-head">
        <div class="section-title">Onboarding Queue</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <span class="section-count" id="pendingCount"></span>
          <button class="refresh-btn" onclick="loadData()">Refresh</button>
        </div>
      </div>

      <div id="pendingList"><div class="loading-row">Loading…</div></div>

      <!-- TaskLeader Pipeline -->
      <div class="pipeline-section">
        <div class="section-head">
          <div class="section-title">TaskLeader Pipeline</div>
          <span class="section-count" id="pipelineCount"></span>
        </div>
        <div id="pipelineList"><div class="loading-row">Loading…</div></div>
      </div>
    </main>
  </div>

  <script src="../js/config.js"></script>
  <script>
    const SESSION_KEY = 'tl_admin_pw';
    let adminPw = '';

    // ── Auth ────────────────────────────────────────────────────────────────
    function submitAuth() {
      const pw = document.getElementById('passwordInput').value;
      if (!pw) return;
      adminPw = pw;
      sessionStorage.setItem(SESSION_KEY, pw);
      loadData();
    }

    function signOut() {
      sessionStorage.removeItem(SESSION_KEY);
      document.getElementById('app').style.display = 'none';
      document.getElementById('auth-gate').style.display = 'flex';
      document.getElementById('passwordInput').value = '';
      adminPw = '';
    }

    function showApp() {
      document.getElementById('auth-gate').style.display = 'none';
      document.getElementById('app').style.display = 'block';
    }

    function showAuthError() {
      const el = document.getElementById('authError');
      el.style.display = 'block';
      document.getElementById('passwordInput').value = '';
      document.getElementById('passwordInput').focus();
      adminPw = '';
      sessionStorage.removeItem(SESSION_KEY);
    }

    // ── Data loading ────────────────────────────────────────────────────────
    async function loadData() {
      const base = window.TASKLEADERS_FUNCTIONS_BASE;
      if (!base) {
        document.getElementById('pendingList').innerHTML =
          '<div class="empty-row">Site configuration missing. Check js/config.js.</div>';
        return;
      }

      try {
        const res = await fetch(
          `${base.replace(/\/$/, '')}/approve-application?admin_password=${encodeURIComponent(adminPw)}`
        );
        const data = await res.json().catch(() => null);

        if (res.status === 401 || (data && data.error?.code === 'unauthorized')) {
          showAuthError();
          return;
        }

        if (!data || data.ok !== true) {
          throw new Error(data?.error?.message || 'Failed to load data');
        }

        showApp();
        renderPending(data.data.pending || []);
        renderPipeline(data.data.approved || []);

      } catch (err) {
        document.getElementById('pendingList').innerHTML =
          `<div class="empty-row">Error loading data: ${err.message}</div>`;
      }
    }

    async function loadPipelineOnly() {
      const base = window.TASKLEADERS_FUNCTIONS_BASE;
      try {
        const res = await fetch(
          `${base.replace(/\/$/, '')}/approve-application?admin_password=${encodeURIComponent(adminPw)}`
        );
        const data = await res.json().catch(() => null);
        if (data?.ok) renderPipeline(data.data.approved || []);
      } catch {}
    }

    // ── Render Onboarding Queue ─────────────────────────────────────────────
    function renderPending(apps) {
      const el = document.getElementById('pendingList');
      const count = document.getElementById('pendingCount');
      count.textContent = `${apps.length} application${apps.length !== 1 ? 's' : ''}`;

      if (apps.length === 0) {
        el.innerHTML = '<div class="empty-row">No pending applications.</div>';
        return;
      }

      el.innerHTML = apps.map(app => {
        const date = new Date(app.created_at).toLocaleDateString('en-CA', {
          month: 'short', day: 'numeric', year: 'numeric'
        });
        const service = app.category_slug
          ? app.category_slug.charAt(0).toUpperCase() + app.category_slug.slice(1).replace(/-/g, ' ')
          : '';

        return `
        <div class="app-card" id="card-${app.id}">
          <div class="app-card-summary" onclick="toggleDetail('${app.id}')">
            <div class="app-card-top">
              <div>
                <div class="app-name">${escHtml(app.contact_name || '')}</div>
                ${app.business_name ? `<div class="app-business">${escHtml(app.business_name)}</div>` : ''}
              </div>
              <div class="app-date">${date}</div>
            </div>
            <div class="app-meta">
              ${service ? `<span class="app-tag service">${escHtml(service)}</span>` : ''}
              ${app.service_area ? `<span class="app-tag">${escHtml(app.service_area)}</span>` : ''}
            </div>
            <span class="expand-toggle" id="toggle-${app.id}">View full application ▾</span>
          </div>
          <div class="app-card-detail" id="detail-${app.id}">
            <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escHtml(app.email || '')}</span></div>
            <div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">${escHtml(app.whatsapp_e164 || '')}</span></div>
            ${app.description ? `<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">${escHtml(app.description)}</span></div>` : ''}
            <div style="margin-top:16px;">
              <button class="approve-btn" id="btn-${app.id}" onclick="approveApp('${app.id}', this)">
                Approve &amp; Generate Link
              </button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    // ── Render TaskLeader Pipeline ──────────────────────────────────────────
    function renderPipeline(providers) {
      const el = document.getElementById('pipelineList');
      const count = document.getElementById('pipelineCount');
      count.textContent = `${providers.length} record${providers.length !== 1 ? 's' : ''}`;

      if (providers.length === 0) {
        el.innerHTML = '<div class="empty-row">No providers in pipeline yet.</div>';
        return;
      }

      el.innerHTML = providers.map(p => {
        const { cls, label } = pipelineStatus(p.status);
        const actionBtn = p.status === 'pending_onboarding'
          ? `<button class="action-btn resend-btn" onclick="event.stopPropagation();resendLink('${escHtml(p.slug)}', this)" title="Show welcome link">Resend Link</button>`
          : p.status === 'pending_approval'
          ? `<button class="action-btn activate-btn" onclick="event.stopPropagation();activateProvider('${escHtml(p.slug)}', this)" title="Mark as Active">Activate</button>`
          : '';

        const welcomeOrigin = window.location.origin;
        const welcomeBase = window.location.pathname.replace('/admin/approve.html', '');
        const welcomeUrl = `${welcomeOrigin}${welcomeBase}/welcome.html?slug=${escHtml(p.slug)}`;

        return `
        <div class="pipe-card" id="pipe-${p.slug}">
          <div class="pipe-card-top" onclick="togglePipelineDetail('${escHtml(p.slug)}')">
            <div class="pipe-card-main">
              <div class="pipe-name">${escHtml(p.first_name || '')} ${escHtml(p.last_name || '')}</div>
              <div class="pipe-slug">${escHtml(p.slug || '')}</div>
            </div>
            <div class="pipe-email">${escHtml(p.email || '')}</div>
            <div class="pipe-right">
              <span class="status-badge ${cls}">${label}</span>
              ${actionBtn}
              <span class="pipe-chevron">▾</span>
            </div>
          </div>
          <div class="pipe-detail" id="pdetail-${p.slug}">
            ${p.email ? `<div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${escHtml(p.email)}</span></div>` : ''}
            ${p.whatsapp_number ? `<div class="detail-row"><span class="detail-label">WhatsApp</span><span class="detail-value">${escHtml(p.whatsapp_number)}</span></div>` : ''}
            ${p.business_name ? `<div class="detail-row"><span class="detail-label">Business</span><span class="detail-value">${escHtml(p.business_name)}</span></div>` : ''}
            ${p.service_area ? `<div class="detail-row"><span class="detail-label">Service area</span><span class="detail-value">${escHtml(p.service_area)}</span></div>` : ''}
            ${p.primary_service ? `<div class="detail-row"><span class="detail-label">Service</span><span class="detail-value">${escHtml(p.primary_service)}</span></div>` : ''}
            ${p.short_description ? `<div class="detail-row"><span class="detail-label">Description</span><span class="detail-value">${escHtml(p.short_description)}</span></div>` : ''}
            <div style="margin-top:14px;">
              <a href="../provider-profile.html?slug=${escHtml(p.slug)}" target="_blank" class="action-btn resend-btn" style="text-decoration:none;display:inline-block;">View Full Profile ↗</a>
            </div>
            ${p.status === 'pending_onboarding' ? `
            <div class="link-result" id="resend-panel-${p.slug}" style="display:block;margin-top:12px;">
              <div class="link-result-label">Welcome link</div>
              <div class="link-result-url" id="resend-url-${p.slug}">${welcomeUrl}</div>
              <button class="copy-btn" id="resend-copy-${p.slug}" onclick="copyText('resend-url-${p.slug}', 'resend-copy-${p.slug}')">Copy Link</button>
            </div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    function pipelineStatus(status) {
      if (status === 'active')           return { cls: 'active',           label: 'Active' };
      if (status === 'pending_approval') return { cls: 'pending-approval', label: 'Pending Approval' };
      return { cls: 'in-progress', label: 'In Progress' };
    }

    // ── Toggle pipeline detail ───────────────────────────────────────────────
    function togglePipelineDetail(slug) {
      const card = document.getElementById(`pipe-${slug}`);
      if (card) card.classList.toggle('open');
    }

    // ── Approve an application ───────────────────────────────────────────────
    async function approveApp(applicationId, btn) {
      btn.disabled = true;
      btn.textContent = 'Approving…';

      const base = window.TASKLEADERS_FUNCTIONS_BASE;

      try {
        const res = await fetch(`${base.replace(/\/$/, '')}/approve-application`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ application_id: applicationId, admin_password: adminPw })
        });
        const data = await res.json().catch(() => null);

        if (!data || data.ok !== true) {
          const msg = data?.error?.message || 'Failed to approve application.';
          btn.disabled = false;
          btn.textContent = 'Approve & Generate Link';
          alert(msg);
          return;
        }

        // Build and display the welcome link inline in the queue card
        const origin = window.location.origin;
        const basePath = window.location.pathname.replace('/admin/approve.html', '');
        const welcomeUrl = `${origin}${basePath}/welcome.html?slug=${data.data.slug}`;

        btn.style.display = 'none';

        const detail = document.getElementById(`detail-${applicationId}`);
        const linkDiv = document.createElement('div');
        linkDiv.className = 'link-result';
        linkDiv.style.display = 'block';
        linkDiv.innerHTML = `
          <div class="link-result-label">Welcome link — send this to the provider</div>
          <div class="link-result-url" id="ql-url-${applicationId}">${escHtml(welcomeUrl)}</div>
          <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
            <button class="copy-btn" id="ql-copy-${applicationId}" onclick="copyText('ql-url-${applicationId}','ql-copy-${applicationId}')">Copy Link</button>
            <button class="copy-btn" style="background:rgba(255,255,255,0.1);" onclick="loadData()">Done — Move to Pipeline</button>
          </div>`;
        detail.appendChild(linkDiv);

      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Approve & Generate Link';
        alert('Network error. Please try again.');
      }
    }

    // ── Resend link ──────────────────────────────────────────────────────────
    function resendLink(slug, btn) {
      // Expand the card and open the detail panel so the welcome link is visible
      const card = document.getElementById(`pipe-${slug}`);
      if (card && !card.classList.contains('open')) {
        card.classList.add('open');
      }
    }

    // ── Activate provider ────────────────────────────────────────────────────
    async function activateProvider(slug, btn) {
      btn.disabled = true;
      btn.textContent = 'Activating…';

      const base = window.TASKLEADERS_FUNCTIONS_BASE;

      try {
        const res = await fetch(`${base.replace(/\/$/, '')}/approve-application`, {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ action: 'activate', slug, admin_password: adminPw })
        });
        const data = await res.json().catch(() => null);

        if (!data || data.ok !== true) {
          const msg = data?.error?.message || 'Failed to activate provider.';
          btn.disabled = false;
          btn.textContent = 'Activate';
          alert(msg);
          return;
        }

        btn.textContent = 'Activated ✓';
        setTimeout(() => loadPipelineOnly(), 800);

      } catch (err) {
        btn.disabled = false;
        btn.textContent = 'Activate';
        alert('Network error. Please try again.');
      }
    }

    // ── Copy text from an element by id ─────────────────────────────────────
    function copyText(sourceId, btnId) {
      const text = document.getElementById(sourceId).textContent;
      const btn  = document.getElementById(btnId);
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy Link';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Copy Link';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    // ── Expand / collapse queue card ─────────────────────────────────────────
    function toggleDetail(appId) {
      const detail = document.getElementById(`detail-${appId}`);
      const toggle = document.getElementById(`toggle-${appId}`);
      const isOpen = detail.classList.contains('open');
      detail.classList.toggle('open', !isOpen);
      toggle.textContent = isOpen ? 'View full application ▾' : 'Hide details ▴';
    }

    // ── Utilities ────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ── Init ─────────────────────────────────────────────────────────────────
    const savedPw = sessionStorage.getItem(SESSION_KEY);
    if (savedPw) {
      adminPw = savedPw;
      loadData();
    }
  </script>
</body>
</html>
