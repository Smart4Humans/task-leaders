<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0a0a14" />
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="Sign in to your TaskLeader account.">
  <link rel="canonical" href="https://task-leaders.com/v0.5/taskleader-signin.html">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>TaskLeader Sign In — TaskLeaders</title>
  <style>
    :root {
      --blue: #0066ff;
      --green: #00c853;
      --gold: #ffb800;
      --bg: #0a0a14;
      --card: rgba(255,255,255,0.05);
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.55);
      --success: #25D366;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .back {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
    }
    .back:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .logo {
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo .task { color: var(--blue); }
    .logo .leaders { color: #fff; }
    main {
      max-width: 480px;
      margin: 0 auto;
      padding: 40px 20px 100px;
    }
    .hero {
      text-align: center;
      margin-bottom: 32px;
    }
    .hero h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    .hero h1 .blue { color: var(--blue); }
    .hero p {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
      margin: 0;
    }
    .signin-card {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      border: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 20px; }
    .form-group:last-child { margin-bottom: 0; }
    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
      color: #fff;
      font-size: 16px;
      outline: none;
      transition: all 0.2s;
    }
    .form-group input:focus {
      border-color: var(--blue);
      background: rgba(255,255,255,0.05);
    }
    .form-group input::placeholder { color: rgba(255,255,255,0.35); }
    .helper-text {
      font-size: 13px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }
    .submit-btn {
      width: 100%;
      padding: 18px;
      border-radius: 14px;
      border: none;
      background: var(--blue);
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }
    .submit-btn:hover { background: #0052cc; }
    .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .trust-badges {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 32px;
      font-size: 12px;
      color: var(--muted);
    }
    .trust-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .success-message {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }
    .success-message.show { display: block; }
    .success-icon { font-size: 56px; margin-bottom: 20px; }
    .success-message h2 { font-size: 22px; margin-bottom: 12px; }
    .success-message p {
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 8px;
    }
    .success-message .email-sent {
      background: rgba(0,200,83,0.1);
      border: 1px solid rgba(0,200,83,0.3);
      border-radius: 10px;
      padding: 16px;
      margin: 20px 0;
      font-weight: 600;
      color: var(--green);
    }
    @media (min-width: 768px) {
      main { padding: 60px 32px; }
      .hero h1 { font-size: 28px; }
      .signin-card { padding: 32px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="homepage.html" class="back">←</a>
    <a href="homepage.html" class="logo"><span class="task">Task</span><span class="leaders">Leaders</span></a>
  </header>

  <main>
    <div class="hero">
      <h1><span class="blue">Task</span>Leader sign-in</h1>
    </div>

    <!-- Sign-in is not yet enabled. Self-serve magic-link / token-based
         provider sign-in is parked as a separate slice. Until then,
         direct providers to the email channel for any profile or
         payment information change requests. -->
    <div class="signin-card" style="text-align:center;">
      <p style="font-size:16px;line-height:1.6;color:#fff;margin:0 0 16px 0;font-weight:600;">
        TaskLeader sign-in is not enabled yet.
      </p>
      <p style="font-size:15px;line-height:1.6;color:var(--muted);margin:0;">
        If you need to update your profile or payment information, contact TaskLeaders at
        <a href="mailto:info@task-leaders.com" style="color:var(--blue);text-decoration:none;font-weight:600;">info@task-leaders.com</a>.
      </p>
    </div>
  </main>

  <script src="js/config.js"></script>
  <footer style="text-align:center;padding:32px 20px;border-top:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);margin-top:32px;">
    <p style="margin:0;font-size:13px;color:rgba(255,255,255,0.5);">
      <a href="terms.html" style="color:rgba(255,255,255,0.5);text-decoration:none;">Terms</a> &nbsp;&middot;&nbsp;
      <a href="privacy.html" style="color:rgba(255,255,255,0.5);text-decoration:none;">Privacy</a> &nbsp;&middot;&nbsp;
      <a href="guidelines.html" style="color:rgba(255,255,255,0.5);text-decoration:none;">TaskLeader Guidelines</a>
      &nbsp;&nbsp;&copy; 2026 TaskLeaders Network Inc.
    </p>
  </footer>
</body>
</html>
