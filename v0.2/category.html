<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Handyman — TaskLeaders</title>
  <style>
    :root {
      --blue: #0066ff;
      --blue-dark: #0052cc;
      --green: #00c853;
      --bg: #0a0a14;
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.55);
      --whatsapp: #25D366;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
    }

    header {
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
    }
    .back {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 13px;
      padding: 5px 8px;
      border-radius: 6px;
    }
    .back:hover { background: rgba(255,255,255,0.04); color: #fff; }

    .logo {
      font-size: 22px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
      line-height: 1;
      white-space: nowrap;
    }
    .logo .task { color: var(--blue); }
    .logo .leaders { color: #fff; }

    .content-header {
      max-width: 960px;
      margin: 0 auto;
      padding: 16px 20px 10px;
    }
    .content-header h1 {
      margin: 0 0 6px 0;
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.4px;
    }
    .content-header h1 span { color: var(--blue); }
    .summary-line {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 600;
    }
    .dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(0,200,83,0.2);
    }

    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px 32px;
    }

    .rank-hint {
      margin: 6px 0 8px;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
    }

    .sort-bar {
      display: flex;
      gap: 6px;
      align-items: center;
      margin: 8px 0 10px;
      flex-wrap: wrap;
    }
    .sort-label {
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      font-weight: 600;
    }
    .sort-btn {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.02);
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sort-btn:hover { border-color: rgba(255,255,255,0.22); color: #fff; }
    .sort-btn.active {
      background: rgba(0,102,255,0.14);
      border-color: rgba(0,102,255,0.45);
      color: #fff;
    }

    .legend {
      margin: 8px 0 12px;
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      padding: 8px 12px;
      background: rgba(255,255,255,0.02);
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .legend .item { display: inline-flex; gap: 4px; align-items: center; cursor: help; }
    .legend .ic { width: 18px; height: 18px; border-radius: 4px; display: inline-flex; align-items: center; justify-content: center; font-size: 11px; }
    /* Legend icons match row badge colors exactly */
    .legend .ic.fast { border: 1px solid rgba(0,200,83,0.25); background: rgba(0,200,83,0.08); color: rgba(0,200,83,0.95); }
    .legend .ic.verified { border: 1px solid var(--blue); background: rgba(0,102,255,0.12); color: var(--blue); }
    .legend .ic.top { border: 1px solid rgba(255,184,0,0.25); background: rgba(255,184,0,0.08); color: rgba(255,184,0,0.95); }
    .legend .ic.today { border: 1px solid rgba(255,100,50,0.25); background: rgba(255,100,50,0.08); color: rgba(255,100,50,0.95); }
    .legend .ic.after { border: 1px solid rgba(150,100,255,0.25); background: rgba(150,100,255,0.08); color: rgba(150,100,255,0.95); }

    .section-heading {
      font-size: 17px;
      font-weight: 700;
      margin: 20px 0 10px;
      color: #fff;
      letter-spacing: -0.2px;
    }
    /* Tighten space between Top 3 and More TaskLeaders sections */
    #board { margin-top: 4px; }

    .board {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
    }

    /* Column headers: # / TaskLeader / Response / Reliab. / Price / badges / WhatsApp */
    .board-header {
      display: grid;
      grid-template-columns: 44px minmax(200px, 2fr) 90px 80px 80px 90px 100px;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.55);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      align-items: center;
    }

    .row {
      display: grid;
      grid-template-columns: 44px minmax(200px, 2fr) 90px 80px 80px 90px 100px;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      align-items: center;
      transition: background 0.12s;
    }
    .row:last-child { border-bottom: none; }
    .row:hover { background: rgba(255,255,255,0.02); }

    .rank {
      font-weight: 800;
      font-size: 16px;
      color: rgba(255,255,255,0.5);
      text-align: center;
    }
    .rank.top { color: var(--blue); }

    .taskleader-cell { min-width: 0; overflow: hidden; display: flex; align-items: center; gap: 10px; }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      overflow: hidden;
      background: rgba(255,255,255,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .name-col { min-width: 0; overflow: hidden; }
    .name {
      font-weight: 600;
      font-size: 14px;
      color: #fff;
      text-decoration: none;
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .name:hover { color: var(--blue); }

    .area {
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric {
      font-size: 13px;
      color: rgba(255,255,255,0.75);
      font-weight: 600;
      text-align: left;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .metric.response { color: rgba(0,200,83,0.9); }
    .metric.reliability { color: rgba(255,184,0,0.9); }

    .price {
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      font-weight: 700;
      white-space: nowrap;
    }

    /* Badges in dedicated column before WhatsApp */
    .badge-cell {
      display: flex;
      gap: 5px;
      justify-content: flex-start;
      align-items: center;
    }

    .bicon {
      width: 24px;
      height: 24px;
      border-radius: 5px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: help;
      position: relative;
      flex-shrink: 0;
    }
    /* Row badge colors match legend exactly */
    .bicon.fast { border: 1px solid rgba(0,200,83,0.25); background: rgba(0,200,83,0.08); color: rgba(0,200,83,0.95); }
    .bicon.verified { border: 1px solid var(--blue); background: rgba(0,102,255,0.12); color: var(--blue); }
    .bicon.top { border: 1px solid rgba(255,184,0,0.25); background: rgba(255,184,0,0.08); color: rgba(255,184,0,0.95); }
    .bicon.today { border: 1px solid rgba(255,100,50,0.25); background: rgba(255,100,50,0.08); color: rgba(255,100,50,0.95); }
    .bicon.after { border: 1px solid rgba(150,100,255,0.25); background: rgba(150,100,255,0.08); color: rgba(150,100,255,0.95); }
    
    .bicon:hover::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.9);
      color: #fff;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 10px;
      white-space: nowrap;
      z-index: 10;
      margin-bottom: 4px;
    }

    .wa {
      padding: 8px 14px;
      border-radius: 6px;
      border: 1px solid rgba(37,211,102,0.5);
      background: rgba(37,211,102,0.12);
      color: #d7ffe7;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.12s;
      flex-shrink: 0;
    }
    .wa:hover {
      background: rgba(37,211,102,0.2);
      border-color: rgba(37,211,102,0.7);
    }

    @media (max-width: 900px) {
      .board-header, .row {
        grid-template-columns: 40px minmax(160px, 2fr) 80px 70px 70px 80px 90px;
        gap: 10px;
        padding: 10px 14px;
      }
    }

    @media (max-width: 680px) {
      .board-header { display: none; }
      .row {
        grid-template-columns: 36px 1fr auto;
        gap: 10px;
        padding: 10px 14px;
      }
      .area, .metric, .price, .badge-cell { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="homepage.html">← Back</a>
    <a href="homepage.html" class="logo"><span class="task">Task</span><span class="leaders">Leaders</span></a>
  </header>

  <div class="content-header">
    <h1>🔧 <span>Handyman</span> in Vancouver</h1>
    <div class="summary-line">
      <span class="pill"><span class="dot"></span>12 available</span>
      <span class="pill">⚡ Avg response ~6 min</span>
      <span class="pill">13 TaskLeaders</span>
    </div>
  </div>

  <main>
    <div class="rank-hint">Providers ranked by response speed, reliability, and price.</div>

    <div class="sort-bar">
      <span class="sort-label">Rank by</span>
      <button class="sort-btn active" onclick="setSort('response')">⚡ Response</button>
      <button class="sort-btn" onclick="setSort('reliability')">✓ Reliability</button>
      <button class="sort-btn" onclick="setSort('price')">$ Price</button>
    </div>

    <div class="legend">
      <span class="item" title="Responds in under 5 minutes"><span class="ic fast">⚡</span> Fast</span>
      <span class="item" title="Identity & background verified"><span class="ic verified">✓</span> Verified</span>
      <span class="item" title="Top 10% performance score"><span class="ic top">🏆</span> Top</span>
      <span class="item" title="Available for bookings today"><span class="ic today">☀</span> Today</span>
      <span class="item" title="Available evenings & weekends"><span class="ic after">🌙</span> After Hours</span>
    </div>

    <div class="section-heading" id="top3Heading">Top 3 by Response</div>
    <div class="board" id="top3"></div>

    <div class="section-heading">More TaskLeaders</div>
    <div class="board" id="board"></div>
  </main>

  <script>
    // Demo data - 13 handyman providers
    const demoProviders = [
      { id: 1, name: "East Van Handyman", area: "East Van", response: 2, reliability: 98, price: 55, verified: true, top: true, today: true },
      { id: 2, name: "Burnaby Repairs", area: "Burnaby", response: 4, reliability: 95, price: 48, verified: true, top: false, today: false },
      { id: 3, name: "Richmond Fixers", area: "Richmond", response: 6, reliability: 92, price: 45, verified: true, top: false, today: true },
      { id: 4, name: "New West Pros", area: "New West", response: 8, reliability: 89, price: 42, verified: false, top: false, today: false },
      { id: 5, name: "Coquitlam Helpers", area: "Coquitlam", response: 12, reliability: 94, price: 50, verified: true, top: false, today: false, after: true },
      { id: 6, name: "Surrey Solutions", area: "Surrey", response: 15, reliability: 87, price: 40, verified: false, top: false, today: true },
      { id: 7, name: "Tri-Cities Elite", area: "Tri-Cities", response: 18, reliability: 96, price: 65, verified: true, top: true, today: false, after: true },
      { id: 8, name: "North Van Experts", area: "North Van", response: 22, reliability: 85, price: 52, verified: false, top: false, today: false },
      { id: 9, name: "Downtown QuickFix", area: "Downtown", response: 25, reliability: 91, price: 58, verified: true, top: false, today: true },
      { id: 10, name: "Kits Repair Co", area: "Kits", response: 28, reliability: 88, price: 46, verified: false, top: false, today: false },
      { id: 11, name: "Mt Pleasant Pros", area: "Mt Pleasant", response: 32, reliability: 93, price: 54, verified: true, top: false, today: false, after: true },
      { id: 12, name: "West End Handyman", area: "West End", response: 38, reliability: 86, price: 44, verified: false, top: false, today: true },
      { id: 13, name: "Vancouver All-Star", area: "Downtown", response: 42, reliability: 90, price: 60, verified: true, top: true, today: false }
    ];

    let sortBy = 'response';

    function formatResp(min) {
      return `~${min} min`;
    }

    function sortProviders() {
      const sorted = [...demoProviders];
      if (sortBy === 'response') sorted.sort((a, b) => a.response - b.response);
      else if (sortBy === 'reliability') sorted.sort((a, b) => b.reliability - a.reliability);
      else if (sortBy === 'price') sorted.sort((a, b) => a.price - b.price);
      return sorted;
    }

    function renderBadges(p) {
      const badges = [];
      if (p.response <= 5) badges.push('<span class="bicon fast" data-tooltip="Fast Responder">⚡</span>');
      if (p.verified) badges.push('<span class="bicon verified" data-tooltip="Verified">✓</span>');
      if (p.top) badges.push('<span class="bicon top" data-tooltip="Top Performer">🏆</span>');
      if (p.today) badges.push('<span class="bicon today" data-tooltip="Available Today">☀</span>');
      if (p.after) badges.push('<span class="bicon after" data-tooltip="After Hours">🌙</span>');
      return badges.slice(0, 3).join('');
    }

    function renderHeader() {
      return `
        <div class="board-header">
          <div style="text-align:center;">Rank</div>
          <div>TaskLeader</div>
          <div>Response</div>
          <div>Reliability</div>
          <div>Price</div>
          <div></div>
          <div>Connect</div>
        </div>
      `;
    }

    function renderRow(p, rank) {
      const avatarUrl = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(p.name)}&backgroundColor=0b1020&textColor=ffffff`;
      return `
        <div class="row">
          <div class="rank ${rank <= 3 ? 'top' : ''}">${rank}</div>
          <div class="taskleader-cell">
            <div class="avatar"><img src="${avatarUrl}" alt=""></div>
            <div class="name-col">
              <a class="name" href="#">${p.name}</a>
              <div class="area">Base: ${p.area}</div>
            </div>
          </div>
          <div class="metric response">${formatResp(p.response)}</div>
          <div class="metric reliability">${p.reliability}%</div>
          <div class="price">$${p.price}/hr</div>
          <div class="badge-cell">${renderBadges(p)}</div>
          <button class="wa">WhatsApp</button>
        </div>
      `;
    }

    function render() {
      const sorted = sortProviders();
      
      document.getElementById('top3Heading').textContent = `Top 3 by ${sortBy.charAt(0).toUpperCase() + sortBy.slice(1)}`;
      
      const top3 = sorted.slice(0, 3);
      document.getElementById('top3').innerHTML = renderHeader() + top3.map((p, i) => renderRow(p, i + 1)).join('');
      
      const rest = sorted.slice(3);
      document.getElementById('board').innerHTML = renderHeader() + rest.map((p, i) => renderRow(p, i + 4)).join('');
    }

    function setSort(mode) {
      sortBy = mode;
      document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      render();
    }

    render();
  </script>
</body>
</html>
