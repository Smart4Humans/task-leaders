<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title id="page-title">Category — Task Leaders</title>
  <style>
    :root {
      --cyan: #00d4ff;
      --purple: #7b2cbf;
      --gold: #FFD700;
      --silver: #C0C0C0;
      --bronze: #CD7F32;
      --dark: #0a0a1a;
      --card: rgba(255,255,255,0.05);
      --success: #25D366;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: linear-gradient(135deg, var(--dark) 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    header {
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      position: sticky;
      top: 0;
      background: rgba(10,10,26,0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }
    .logo {
      font-size: 18px;
      font-weight: 800;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-decoration: none;
    }
    .category-title {
      font-size: 20px;
      font-weight: 700;
    }
    .tasker-count {
      font-size: 13px;
      opacity: 0.6;
      margin-left: 8px;
    }
    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      padding-bottom: 100px;
    }
    @media (min-width: 768px) {
      main { max-width: 700px; }
    }
    
    /* Activity Indicator */
    .activity-bar {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .activity-item {
      text-align: center;
    }
    .activity-value {
      font-size: 20px;
      font-weight: 700;
      color: var(--cyan);
    }
    .activity-label {
      font-size: 11px;
      opacity: 0.6;
      margin-top: 4px;
    }
    
    /* Recommended Section */
    .recommended-section {
      margin-bottom: 24px;
    }
    .section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0.8;
    }
    .recommended-badge {
      background: linear-gradient(135deg, var(--gold), #FFA500);
      color: #000;
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 10px;
      font-weight: 700;
    }
    
    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 10px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--cyan);
      color: #000;
      border-color: var(--cyan);
    }
    
    /* Provider Cards */
    .leaderboard {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    
    .tasker-card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 16px;
      transition: all 0.2s;
    }
    .tasker-card:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
    }
    
    .tasker-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    
    .rank {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .rank.gold { 
      background: linear-gradient(135deg, var(--gold), #FFA500);
      color: #000;
    }
    .rank.silver { 
      background: linear-gradient(135deg, var(--silver), #808080);
      color: #000;
    }
    .rank.bronze { 
      background: linear-gradient(135deg, var(--bronze), #8B4513);
      color: #fff;
    }
    .rank.other { 
      background: rgba(255,255,255,0.1);
      color: #fff;
    }
    
    .tasker-main {
      flex: 1;
      min-width: 0;
    }
    
    .tasker-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .tasker-meta {
      font-size: 12px;
      opacity: 0.6;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 20px;
      background: rgba(74,222,128,0.15);
      color: #4ade80;
      flex-shrink: 0;
    }
    .status-badge::before {
      content: "";
      width: 8px;
      height: 8px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    .tasker-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid rgba(255,255,255,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 12px;
    }
    
    .stat {
      text-align: center;
    }
    .stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--cyan);
    }
    .stat-label {
      font-size: 10px;
      opacity: 0.6;
      margin-top: 2px;
      text-transform: uppercase;
    }
    .stat.rate .stat-value {
      color: #4ade80;
    }
    .stat.rating .stat-value {
      color: var(--gold);
    }
    
    .whatsapp-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: var(--success);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .whatsapp-btn:hover {
      background: #128C7E;
      transform: scale(1.02);
    }
    
    .badges-row {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 10px;
      padding: 4px 10px;
      border-radius: 12px;
      font-weight: 600;
    }
    .badge.speed { background: rgba(0,212,255,0.2); color: var(--cyan); }
    .badge.pro { background: rgba(168,85,247,0.2); color: #a855f7; }
    .badge.cheap { background: rgba(74,222,128,0.2); color: #4ade80; }
    .badge.new { background: rgba(251,191,36,0.2); color: #fbbf24; }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      opacity: 0.6;
    }
    .empty-state h3 {
      margin-bottom: 12px;
    }
    
    /* Desktop improvements */
    @media (min-width: 768px) {
      main { padding: 24px; }
      .filters { flex-wrap: wrap; overflow: visible; }
      .tasker-card { padding: 20px; }
      .tasker-name { font-size: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="homepage.html" class="logo">← Task Leaders</a>
    <div style="text-align: right;">
      <div class="category-title" id="category-title">Loading...</div>
      <div class="tasker-count" id="tasker-count">0 Task Leaders</div>
    </div>
  </header>

  <main>
    <!-- Activity Indicator -->
    <div class="activity-bar" id="activity-bar">
      <div class="activity-item">
        <div class="activity-value" id="available-count">0</div>
        <div class="activity-label">Available Now</div>
      </div>
      <div class="activity-item">
        <div class="activity-value" id="avg-response">--</div>
        <div class="activity-label">Avg Response</div>
      </div>
    </div>
    
    <!-- Recommended Providers -->
    <div class="recommended-section" id="recommended-section">
      <div class="section-header">
        <span>⭐ Recommended TaskLeaders</span>
        <span class="recommended-badge">TOP PICKS</span>
      </div>
      <div class="leaderboard" id="recommended-list">
        <!-- Dynamically populated -->
      </div>
    </div>

    <!-- Sort Filters -->
    <div class="filters">
      <button class="filter-btn active" onclick="setSort('default')">🏆 Rank</button>
      <button class="filter-btn" onclick="setSort('response_time')">⚡ Response</button>
      <button class="filter-btn" onclick="setSort('reliability')">⭐ Reliability</button>
      <button class="filter-btn" onclick="setSort('price')">💰 Price</button>
    </div>

    <!-- Provider List -->
    <div class="leaderboard" id="provider-list">
      <!-- Dynamically populated -->
    </div>
    
    <!-- Empty State -->
    <div class="empty-state" id="empty-state" style="display: none;">
      <h3>No providers yet</h3>
      <p>Be the first to join this category!</p>
      <a href="become-task-leader.html" style="color: var(--cyan);">Apply now →</a>
    </div>
  </main>

  <!-- Load Database -->
  <script src="js/db.js"></script>
  
  <script>
    // Get category from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const categoryId = urlParams.get('category') || 'painting';
    
    // Current sort
    let currentSort = 'default';
    
    // Initialize page
    function init() {
      const category = TaskLeadersDB.categories.find(c => c.id === categoryId);
      if (category) {
        document.getElementById('category-title').textContent = `${category.icon} ${category.name}`;
        document.getElementById('page-title').textContent = `${category.name} — Task Leaders`;
      }
      
      loadProviders();
    }
    
    // Load and display providers
    function loadProviders() {
      const providers = TaskLeadersDB.getProvidersByCategory(categoryId);
      const stats = TaskLeadersDB.getCategoryStats(categoryId);
      
      // Update stats
      document.getElementById('tasker-count').textContent = `${providers.length} Task Leader${providers.length !== 1 ? 's' : ''}`;
      document.getElementById('available-count').textContent = stats.available_now;
      document.getElementById('avg-response').textContent = stats.avg_response_time > 0 ? `~${stats.avg_response_time}m` : '--';
      
      // Show empty state if no providers
      if (providers.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        document.getElementById('recommended-section').style.display = 'none';
        document.getElementById('provider-list').style.display = 'none';
        return;
      }
      
      // Load recommended providers
      loadRecommendedProviders();
      
      // Load main provider list
      renderProviderList(providers);
    }
    
    // Load recommended providers
    function loadRecommendedProviders() {
      const recommended = TaskLeadersDB.getRecommendedProviders(categoryId, 3);
      const container = document.getElementById('recommended-list');
      
      if (recommended.length === 0) {
        document.getElementById('recommended-section').style.display = 'none';
        return;
      }
      
      container.innerHTML = recommended.map((provider, index) => 
        createProviderCard(provider, index + 1, true)
      ).join('');
    }
    
    // Render provider list
    function renderProviderList(providers) {
      const sorted = TaskLeadersDB.sortProviders(providers, currentSort);
      const container = document.getElementById('provider-list');
      
      container.innerHTML = sorted.map((provider, index) => 
        createProviderCard(provider, index + 1, false)
      ).join('');
    }
    
    // Create provider card HTML
    function createProviderCard(provider, rank, isRecommended) {
      const rankClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'other';
      const responseTime = TaskLeadersDB.formatResponseTime(provider.response_time_minutes);
      const price = TaskLeadersDB.formatPrice(provider.hourly_rate);
      
      // Generate badges
      let badges = '';
      if (provider.response_time_minutes <= 5) {
        badges += '<span class="badge speed">⚡ SPEEDSTER</span>';
      }
      if (provider.founding_provider_status) {
        badges += '<span class="badge pro">💎 FOUNDING</span>';
      }
      
      // WhatsApp link with prefilled message
      const whatsappNumber = provider.whatsapp_number;
      const categoryName = TaskLeadersDB.categories.find(c => c.id === provider.category)?.name || provider.category;
      const message = encodeURIComponent(`Hi! I found you on TaskLeaders and need help with ${categoryName}.`);
      const whatsappLink = `https://wa.me/${whatsappNumber}?text=${message}`;
      
      return `
        <div class="tasker-card">
          <div class="tasker-header">
            <div class="rank ${rankClass}">${rank}</div>
            <div class="tasker-main">
              <div class="tasker-name">${escapeHtml(provider.business_name)}</div>
              <div class="tasker-meta">${provider.service_area}</div>
            </div>
            <div class="status-badge">Online</div>
          </div>
          <div class="tasker-stats">
            <div class="stat rate">
              <div class="stat-value">${price}</div>
              <div class="stat-label">per hour</div>
            </div>
            <div class="stat">
              <div class="stat-value">${responseTime}</div>
              <div class="stat-label">response</div>
            </div>
            <div class="stat rating">
              <div class="stat-value">${provider.reliability_score.toFixed(1)}★</div>
              <div class="stat-label">rating</div>
            </div>
            <div class="stat">
              <div class="stat-value">${provider.response_rate}%</div>
              <div class="stat-label">response rate</div>
            </div>
          </div>
          ${badges ? `<div class="badges-row">${badges}</div>` : ''}
          <a href="${whatsappLink}" class="whatsapp-btn" target="_blank">
            💬 Message on WhatsApp
          </a>
        </div>
      `;
    }
    
    // Set sort option
    function setSort(sortBy) {
      currentSort = sortBy;
      
      // Update button states
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      event.target.classList.add('active');
      
      // Reload providers with new sort
      const providers = TaskLeadersDB.getProvidersByCategory(categoryId);
      renderProviderList(providers);
    }
    
    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Initialize on load
    init();
  </script>
</body>
</html>
