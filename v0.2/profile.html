<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title id="page-title">Profile — TaskLeaders</title>
  <style>
    :root {
      --blue: #0066ff;
      --blue-dark: #0052cc;
      --green: #00c853;
      --bg: #0a0a14;
      --panel: rgba(255,255,255,0.03);
      --border: rgba(255,255,255,0.08);
      --muted: rgba(255,255,255,0.6);
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
    }

    header {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
    }
    .back {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 14px;
      padding: 6px 10px;
      border-radius: 6px;
    }
    .back:hover { background: rgba(255,255,255,0.04); color: #fff; }
    .logo {
      font-size: 28px;
      font-weight: 800;
      text-decoration: none;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }
    .logo .task { color: var(--blue); }
    .logo .leaders { color: #fff; }

    main {
      max-width: 760px;
      margin: 0 auto;
      padding: 28px 32px 64px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 16px;
      background: rgba(255,255,255,0.02);
      padding: 18px;
    }

    .top {
      display: grid;
      grid-template-columns: 74px 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 14px;
    }
    .avatar {
      width: 74px;
      height: 74px;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .name {
      font-size: 22px;
      font-weight: 900;
      margin: 0 0 4px 0;
      letter-spacing: -0.3px;
    }
    .area {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      font-weight: 650;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 14px 0 16px;
    }
    .metric {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.02);
      text-align: center;
    }
    .metric .v {
      font-size: 16px;
      font-weight: 900;
    }
    .metric .l {
      font-size: 11px;
      color: rgba(255,255,255,0.45);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-top: 4px;
    }
    .v.response { color: rgba(0,200,83,0.9); }
    .v.reliability { color: rgba(255,184,0,0.9); }

    .desc {
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      line-height: 1.55;
      margin: 0 0 16px;
    }

    .wa {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(0,200,83,0.55);
      background: rgba(0,200,83,0.16);
      color: #d7ffe7;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.12s;
    }
    .wa:hover { background: rgba(0,200,83,0.22); transform: translateY(-1px); }

    /* Modal reuse */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.86);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }
    .modal-overlay.active { display: flex; }
    .modal {
      width: 100%;
      max-width: 420px;
      background: #12121f;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 14px;
      padding: 20px;
    }
    .modal h3 { margin: 0 0 12px 0; font-size: 16px; font-weight: 900; }
    .preview {
      background: rgba(0,200,83,0.08);
      border-left: 3px solid rgba(0,200,83,0.9);
      padding: 12px;
      border-radius: 0 12px 12px 0;
      margin-bottom: 12px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
      line-height: 1.45;
    }
    .consent { display: flex; gap: 10px; align-items: flex-start; margin: 14px 0 16px; cursor: pointer; }
    .consent input { margin-top: 2px; width: 16px; height: 16px; }
    .consent span { color: rgba(255,255,255,0.72); font-size: 13px; line-height: 1.35; }
    .modal-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: rgba(0,200,83,0.95);
      color: #001a08;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .modal-cancel {
      width: 100%;
      padding: 11px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
    }

    @media (max-width: 900px) {
      header { padding: 16px 20px; }
      .logo { font-size: 24px; }
      main { padding: 20px 20px 56px; }
    }
    @media (max-width: 480px) {
      .metrics { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <a class="back" href="javascript:history.back()">← Back</a>
    <a href="homepage.html" class="logo"><span class="task">Task</span><span class="leaders">Leaders</span></a>
  </header>

  <main>
    <div class="card" id="card" style="display:none;"></div>
    <div class="card" id="missing" style="display:none; color: rgba(255,255,255,0.65);">
      TaskLeader not found.
    </div>
  </main>

  <div class="modal-overlay" id="waModal">
    <div class="modal" role="dialog" aria-modal="true">
      <h3>Continue to WhatsApp</h3>
      <div class="preview">"Hi! I found you on TaskLeaders and need help with <span id="mCat"></span>."</div>
      <label class="consent">
        <input type="checkbox" id="mConsent" />
        <span>I agree to receive follow-up messages from TaskLeaders related to this inquiry.</span>
      </label>
      <button class="modal-btn" onclick="goWhatsApp()">Continue to WhatsApp</button>
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const id = params.get('id');
    let provider = null;

    function formatResponse(minutes) {
      if (minutes <= 1) return '~1 min';
      return `~${minutes} min`;
    }
    function reliabilityPct(score0to5) {
      if (!score0to5 || score0to5 <= 0) return 0;
      return Math.round(score0to5 * 20);
    }

    function render() {
      provider = id ? TaskLeadersDB.getProviderById(id) : null;
      if (!provider) {
        document.getElementById('missing').style.display = 'block';
        return;
      }

      const cat = (TaskLeadersDB.categories.find(c => c.id === provider.category) || { name: provider.category }).name;
      document.getElementById('page-title').textContent = `${provider.business_name} — TaskLeaders`;

      const avatarUrl = `https://api.dicebear.com/7.x/initials/svg?seed=${encodeURIComponent(provider.business_name)}&backgroundColor=0b1020&textColor=ffffff`;
      const resp = formatResponse(provider.response_time_minutes);
      const rel = reliabilityPct(provider.reliability_score);

      const card = document.getElementById('card');
      card.innerHTML = `
        <div class="top">
          <div class="avatar"><img alt="" src="${avatarUrl}" /></div>
          <div>
            <div class="name">${escapeHtml(provider.business_name)}</div>
            <div class="area">${escapeHtml(provider.service_area)} • ${cat}</div>
          </div>
        </div>

        <div class="metrics">
          <div class="metric">
            <div class="v response">${resp}</div>
            <div class="l">Response</div>
          </div>
          <div class="metric">
            <div class="v reliability">${rel}%</div>
            <div class="l">Reliability</div>
          </div>
          <div class="metric">
            <div class="v">$${provider.hourly_rate}/hr</div>
            <div class="l">Price</div>
          </div>
        </div>

        <p class="desc">${escapeHtml(provider.description || '')}</p>

        <button class="wa" onclick="openModal()">💬 WhatsApp</button>
      `;
      card.style.display = 'block';
      document.getElementById('mCat').textContent = cat;
    }

    function openModal() {
      document.getElementById('mConsent').checked = false;
      document.getElementById('waModal').classList.add('active');
    }
    function closeModal() {
      document.getElementById('waModal').classList.remove('active');
    }

    function goWhatsApp() {
      const consent = document.getElementById('mConsent').checked;
      console.log('Inquiry', { provider_id: provider.provider_id, consent, ts: new Date().toISOString() });
      const cat = (TaskLeadersDB.categories.find(c => c.id === provider.category) || { name: provider.category }).name;
      const message = encodeURIComponent(`Hi! I found you on TaskLeaders and need help with ${cat}.`);
      const url = `https://wa.me/${provider.whatsapp_number}?text=${message}`;
      closeModal();
      window.open(url, '_blank');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    document.getElementById('waModal').addEventListener('click', (e) => {
      if (e.target.id === 'waModal') closeModal();
    });

    render();
  </script>
</body>
</html>
