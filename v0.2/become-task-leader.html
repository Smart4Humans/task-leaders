<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <meta name="theme-color" content="#0a0a14" />
  <meta http-equiv="refresh" content="0; url=taskleader-profile-setup.html" />
  <title>Redirecting — TaskLeaders</title>
  <style>
    :root {
      --blue: #0066ff;
      --bg: #0a0a14;
      --muted: rgba(255,255,255,0.55);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: var(--bg);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    .redirect-container {
      max-width: 400px;
    }
    .logo {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 24px;
      letter-spacing: -0.5px;
    }
    .logo .task { color: var(--blue); }
    .logo .leaders { color: #fff; }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
    }
    p {
      color: var(--muted);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border-radius: 12px;
      background: var(--blue);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }
    .btn:hover { background: #0052cc; }
  </style>
</head>
<body>
  <div class="redirect-container">
    <div class="logo"><span class="task">Task</span><span class="leaders">Leaders</span></div>
    <h1>We've simplified our signup</h1>
    <p>You're being redirected to our new streamlined profile creation process.</p>
    <a href="taskleader-profile-setup.html" class="btn">Create your Public Profile →</a>
  </div>
  <script>
    // Fallback redirect if meta refresh doesn't work
    window.location.replace('taskleader-profile-setup.html');
  </script>
</body>
</html>
