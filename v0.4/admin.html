<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Admin — TaskLeaders</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      line-height: 1.5;
    }
    
    /* Header */
    header {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 17px;
      font-weight: 700;
      color: #00d4ff;
    }
    .admin-badge {
      font-size: 10px;
      padding: 3px 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      color: rgba(255,255,255,0.5);
    }
    
    /* Main */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }
    
    /* Stats */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .stat {
      font-size: 13px;
    }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #00d4ff;
    }
    .stat-label {
      color: rgba(255,255,255,0.4);
      font-size: 11px;
    }
    
    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: rgba(255,255,255,0.5);
      font-size: 12px;
      cursor: pointer;
    }
    .filter-btn.active {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-color: rgba(255,255,255,0.2);
    }
    .filter-btn .badge {
      margin-left: 5px;
      padding: 1px 6px;
      background: #ff6b6b;
      border-radius: 10px;
      font-size: 10px;
      color: #fff;
    }
    
    /* Search */
    .search-box {
      margin-bottom: 16px;
    }
    .search-input {
      width: 100%;
      padding: 10px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #fff;
      font-size: 13px;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.3); }
    
    /* Queue */
    .queue {
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      overflow: hidden;
    }
    .queue-header {
      display: grid;
      grid-template-columns: 1fr 100px 100px 120px;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.02);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    
    .queue-item {
      display: grid;
      grid-template-columns: 1fr 100px 100px 120px;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      align-items: center;
      font-size: 13px;
    }
    .queue-item:last-child { border-bottom: none; }
    .queue-item:hover { background: rgba(255,255,255,0.01); }
    .queue-item.pending { border-left: 2px solid #fbbf24; }
    .queue-item.approved { border-left: 2px solid #4ade80; }
    
    .item-main { min-width: 0; }
    .item-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-meta {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
    .item-category, .item-rate {
      font-size: 12px;
      color: rgba(255,255,255,0.5);
    }
    .item-actions {
      display: flex;
      gap: 6px;
    }
    .action-btn {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
    }
    .action-btn.approve { background: #4ade80; color: #000; }
    .action-btn.edit { background: rgba(255,255,255,0.08); color: #fff; }
    .action-btn.remove { background: rgba(255,107,107,0.15); color: #ff6b6b; }
    
    .empty {
      text-align: center;
      padding: 40px 20px;
      color: rgba(255,255,255,0.4);
      font-size: 13px;
    }
    
    /* Edit Panel */
    .edit-panel {
      display: none;
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 100%;
      max-width: 380px;
      background: #12121f;
      border-left: 1px solid rgba(255,255,255,0.08);
      padding: 20px;
      overflow-y: auto;
      z-index: 100;
    }
    .edit-panel.active { display: block; }
    .edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .edit-header h3 { margin: 0; font-size: 16px; }
    .close-btn {
      background: none; border: none;
      color: rgba(255,255,255,0.5);
      font-size: 20px; cursor: pointer;
    }
    .form-group {
      margin-bottom: 14px;
    }
    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #fff;
      font-size: 13px;
    }
    .form-group textarea { min-height: 60px; resize: vertical; }
    .save-btn {
      width: 100%;
      padding: 12px;
      border-radius: 4px;
      border: none;
      background: #00d4ff;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Mobile */
    @media (max-width: 640px) {
      .queue-header { display: none; }
      .queue-item {
        grid-template-columns: 1fr auto;
        gap: 12px;
      }
      .item-category, .item-rate { display: none; }
    }
    
    @media (min-width: 768px) {
      header { padding: 16px 24px; }
      main { padding: 20px 24px; }
    }
  </style>
</head>
<body>
  <header>
    <span class="logo">TaskLeaders</span>
    <span class="admin-badge">ADMIN</span>
  </header>

  <main>
    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="stat-pending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-approved">0</div>
        <div class="stat-label">Approved</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="stat-total">0</div>
        <div class="stat-label">Total</div>
      </div>
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('pending')">
        Pending <span class="badge" id="pending-badge">0</span>
      </button>
      <button class="filter-btn" onclick="setFilter('approved')">Approved</button>
      <button class="filter-btn" onclick="setFilter('all')">All</button>
    </div>

    <div class="search-box">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by business or contact name..." onkeyup="loadQueue()">
    </div>

    <div class="queue" id="queue">
      <div class="queue-header">
        <span>Provider</span>
        <span>Category</span>
        <span>Rate</span>
        <span>Actions</span>
      </div>
      <div id="queue-items"></div>
    </div>

    <div class="empty" id="empty-state" style="display: none;">
      No providers match your filters.
    </div>
  </main>

  <!-- Edit Panel -->
  <div class="edit-panel" id="edit-panel">
    <div class="edit-header">
      <h3>Edit Provider</h3>
      <button class="close-btn" onclick="closeEdit()">×</button>
    </div>
    <form id="edit-form" onsubmit="saveProvider(event)">
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>Business Name</label>
        <input type="text" id="edit-business" required>
      </div>
      <div class="form-group">
        <label>Contact Name</label>
        <input type="text" id="edit-contact" required>
      </div>
      <div class="form-group">
        <label>WhatsApp</label>
        <input type="text" id="edit-whatsapp" required>
      </div>
      <div class="form-group">
        <label>Category</label>
        <select id="edit-category" required>
          <option value="plumbing">Plumbing</option>
          <option value="electrical">Electrical</option>
          <option value="painting">Painting</option>
          <option value="cleaning">Cleaning</option>
          <option value="handyman">Handyman</option>
          <option value="furniture-assembly">Furniture Assembly</option>
          <option value="moving">Moving Help</option>
          <option value="yard-work">Yard Work</option>
        </select>
      </div>
      <div class="form-group">
        <label>Service Area</label>
        <input type="text" id="edit-area" required>
      </div>
      <div class="form-group">
        <label>Hourly Rate</label>
        <input type="number" id="edit-rate" min="15" required>
      </div>
      <div class="form-group">
        <label>Response Time (min)</label>
        <input type="number" id="edit-response" min="1" required>
      </div>
      <div class="form-group">
        <label>Reliability (0-5)</label>
        <input type="number" id="edit-reliability" min="0" max="5" step="0.1" required>
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="edit-description" maxlength="200" required></textarea>
      </div>
      <button type="submit" class="save-btn">Save Changes</button>
    </form>
  </div>

  <script src="js/db.js"></script>
  <script>
    let currentFilter = 'pending';
    let editingId = null;

    function init() {
      updateStats();
      loadQueue();
    }

    function updateStats() {
      const all = TaskLeadersDB.providers;
      const approved = all.filter(p => p.approved).length;
      const pending = all.filter(p => !p.approved).length;
      document.getElementById('stat-pending').textContent = pending;
      document.getElementById('stat-approved').textContent = approved;
      document.getElementById('stat-total').textContent = all.length;
      document.getElementById('pending-badge').textContent = pending;
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      loadQueue();
    }

    function loadQueue() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let providers = TaskLeadersDB.providers;

      if (currentFilter === 'pending') providers = providers.filter(p => !p.approved);
      else if (currentFilter === 'approved') providers = providers.filter(p => p.approved);

      if (search) {
        providers = providers.filter(p => 
          p.business_name.toLowerCase().includes(search) ||
          p.contact_name.toLowerCase().includes(search)
        );
      }

      providers.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

      const container = document.getElementById('queue-items');
      const empty = document.getElementById('empty-state');

      if (providers.length === 0) {
        container.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      container.innerHTML = providers.map(p => `
        <div class="queue-item ${p.approved ? 'approved' : 'pending'}">
          <div class="item-main">
            <div class="item-name">${escapeHtml(p.business_name)}</div>
            <div class="item-meta">${escapeHtml(p.contact_name)} • ${escapeHtml(p.service_area)}</div>
          </div>
          <span class="item-category">${TaskLeadersDB.categories.find(c => c.id === p.category)?.name || p.category}</span>
          <span class="item-rate">$${p.hourly_rate}/hr</span>
          <div class="item-actions">
            ${!p.approved ? `<button class="action-btn approve" onclick="approve('${p.provider_id}')">Approve</button>` : ''}
            <button class="action-btn edit" onclick="edit('${p.provider_id}')">Edit</button>
            <button class="action-btn remove" onclick="remove('${p.provider_id}')">Remove</button>
          </div>
        </div>
      `).join('');
    }

    function approve(id) {
      if (!confirm('Approve this provider?')) return;
      TaskLeadersDB.approveProvider(id);
      updateStats();
      loadQueue();
    }

    function remove(id) {
      if (!confirm('Remove this provider?')) return;
      TaskLeadersDB.removeProvider(id);
      updateStats();
      loadQueue();
    }

    function edit(id) {
      const p = TaskLeadersDB.getProviderById(id);
      if (!p) return;
      editingId = id;
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-business').value = p.business_name;
      document.getElementById('edit-contact').value = p.contact_name;
      document.getElementById('edit-whatsapp').value = p.whatsapp_number;
      document.getElementById('edit-category').value = p.category;
      document.getElementById('edit-area').value = p.service_area;
      document.getElementById('edit-rate').value = p.hourly_rate;
      document.getElementById('edit-response').value = p.response_time_minutes;
      document.getElementById('edit-reliability').value = p.reliability_score;
      document.getElementById('edit-description').value = p.description;
      document.getElementById('edit-panel').classList.add('active');
    }

    function closeEdit() {
      document.getElementById('edit-panel').classList.remove('active');
      editingId = null;
    }

    function saveProvider(e) {
      e.preventDefault();
      if (!editingId) return;
      TaskLeadersDB.updateProvider(editingId, {
        business_name: document.getElementById('edit-business').value.trim(),
        contact_name: document.getElementById('edit-contact').value.trim(),
        whatsapp_number: document.getElementById('edit-whatsapp').value.trim(),
        category: document.getElementById('edit-category').value,
        service_area: document.getElementById('edit-area').value.trim(),
        hourly_rate: parseFloat(document.getElementById('edit-rate').value),
        response_time_minutes: parseInt(document.getElementById('edit-response').value),
        reliability_score: parseFloat(document.getElementById('edit-reliability').value),
        description: document.getElementById('edit-description').value.trim()
      });
      closeEdit();
      loadQueue();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
