<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>TaskLeaders — Find service providers ranked by speed</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      line-height: 1.5;
    }
    /* Header */
    header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 18px;
      font-weight: 700;
      color: #00d4ff;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .logo span { color: #fff; }
    .nav-link {
      font-size: 13px;
      color: rgba(255,255,255,0.7);
      text-decoration: none;
    }
    .nav-link:hover { color: #fff; }
    
    /* Hero */
    .hero {
      padding: 32px 16px 24px;
      max-width: 600px;
      margin: 0 auto;
    }
    .hero h1 {
      font-size: 24px;
      font-weight: 600;
      margin: 0 0 8px 0;
      line-height: 1.3;
    }
    .hero p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
      margin: 0 0 20px 0;
    }
    
    /* Search */
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }
    .search-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 15px;
      outline: none;
    }
    .search-input::placeholder { color: rgba(255,255,255,0.4); }
    .search-input:focus { border-color: #00d4ff; }
    .search-btn {
      padding: 12px 20px;
      border-radius: 8px;
      border: none;
      background: #00d4ff;
      color: #000;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    
    /* Activity */
    .activity {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #4ade80;
      margin-bottom: 24px;
    }
    .activity::before {
      content: "";
      width: 6px;
      height: 6px;
      background: #4ade80;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    
    /* Categories */
    .section {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 32px;
    }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.5);
      margin-bottom: 12px;
    }
    .category-list {
      display: flex;
      flex-direction: column;
      gap: 1px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      overflow: hidden;
    }
    .category-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      background: #0a0a1a;
      text-decoration: none;
      color: #fff;
      transition: background 0.15s;
    }
    .category-item:hover { background: rgba(255,255,255,0.03); }
    .category-main {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .category-icon { font-size: 20px; }
    .category-name { font-size: 15px; font-weight: 500; }
    .category-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
    }
    .category-arrow {
      color: rgba(255,255,255,0.3);
      font-size: 14px;
    }
    
    /* Provider CTA */
    .provider-cta {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 16px 40px;
    }
    .cta-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 20px 16px;
      text-align: center;
    }
    .cta-box h3 {
      font-size: 16px;
      font-weight: 600;
      margin: 0 0 6px 0;
    }
    .cta-box p {
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      margin: 0 0 16px 0;
    }
    .cta-btn {
      display: inline-block;
      padding: 10px 20px;
      border-radius: 6px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.2);
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.15s;
    }
    .cta-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.3);
    }
    
    /* Footer */
    footer {
      text-align: center;
      padding: 20px;
      border-top: 1px solid rgba(255,255,255,0.05);
    }
    footer a {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
    }
    
    /* Desktop */
    @media (min-width: 768px) {
      header { padding: 16px 24px; }
      .logo { font-size: 20px; }
      .hero { padding: 48px 24px 32px; }
      .hero h1 { font-size: 28px; }
      .section { padding: 0 24px 40px; }
      .provider-cta { padding: 0 24px 48px; }
      .category-list {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 1px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a href="homepage.html" class="logo">Task<span>Leaders</span></a>
    <a href="become-task-leader.html" class="nav-link">Become a TL</a>
  </header>

  <section class="hero">
    <h1>What do you need help with?</h1>
    <p>Connect with local service providers on WhatsApp. No accounts, no fees.</p>
    <div class="search-box">
      <input type="text" class="search-input" placeholder="Search services..." id="searchInput">
      <button class="search-btn" onclick="handleSearch()">Search</button>
    </div>
    <div class="activity">
      <span id="online-count">0</span> providers available now
    </div>
  </section>

  <section class="section">
    <div class="section-title">Popular Services</div>
    <div class="category-list" id="category-list">
      <!-- Populated by JS -->
    </div>
  </section>

  <section class="provider-cta">
    <div class="cta-box">
      <h3>Are you a service provider?</h3>
      <p>Join TaskLeaders and get customer inquiries directly on WhatsApp.</p>
      <a href="become-task-leader.html" class="cta-btn">Apply to join</a>
    </div>
  </section>

  <footer>
    <a href="admin.html">Admin</a>
  </footer>

  <script src="js/db.js"></script>
  <script>
    const categories = [
      { id: 'plumbing', icon: '🔧', name: 'Plumbing' },
      { id: 'electrical', icon: '⚡', name: 'Electrical' },
      { id: 'painting', icon: '🎨', name: 'Painting' },
      { id: 'cleaning', icon: '🧹', name: 'Cleaning' },
      { id: 'handyman', icon: '🔨', name: 'Handyman' },
      { id: 'furniture-assembly', icon: '📦', name: 'Furniture Assembly' },
      { id: 'moving', icon: '🚚', name: 'Moving Help' },
      { id: 'yard-work', icon: '🌿', name: 'Yard Work' }
    ];

    function init() {
      renderCategories();
      updateOnlineCount();
    }

    function renderCategories() {
      const list = document.getElementById('category-list');
      list.innerHTML = categories.map(cat => {
        const count = TaskLeadersDB.getProvidersByCategory(cat.id).length;
        return `
          <a href="category.html?category=${cat.id}" class="category-item">
            <div class="category-main">
              <span class="category-icon">${cat.icon}</span>
              <span class="category-name">${cat.name}</span>
            </div>
            <span class="category-meta">${count > 0 ? count + ' TL' : 'No TL yet'}</span>
            <span class="category-arrow">→</span>
          </a>
        `;
      }).join('');
    }

    function updateOnlineCount() {
      const approved = TaskLeadersDB.getApprovedProviders();
      const online = Math.ceil(approved.length * 0.3);
      document.getElementById('online-count').textContent = online;
    }

    function handleSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (query) {
        // Default to handyman category for now
        window.location.href = 'category.html?category=handyman';
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handleSearch();
    });

    init();
  </script>
</body>
</html>
