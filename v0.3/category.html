<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title id="page-title">Category — TaskLeaders</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
      background: #0a0a1a;
      color: #fff;
      min-height: 100vh;
      line-height: 1.5;
    }
    /* Header */
    header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .back-link {
      font-size: 14px;
      color: rgba(255,255,255,0.6);
      text-decoration: none;
    }
    .back-link:hover { color: #fff; }
    .category-title {
      font-size: 16px;
      font-weight: 600;
    }
    
    /* Main */
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 16px;
    }
    
    /* Summary Bar */
    .summary-bar {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 16px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .summary-bar span { display: flex; align-items: center; gap: 4px; }
    .dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; }
    
    /* Sort Controls */
    .sort-controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .sort-btn {
      padding: 6px 12px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.15);
      background: transparent;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sort-btn:hover { border-color: rgba(255,255,255,0.3); }
    .sort-btn.active {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border-color: rgba(255,255,255,0.3);
    }
    
    /* Leaderboard */
    .leaderboard {
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      overflow: hidden;
    }
    .leaderboard-header {
      display: grid;
      grid-template-columns: 40px 1fr 80px 70px 60px 90px;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: rgba(255,255,255,0.4);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .leaderboard-header span:last-child { text-align: right; }
    
    /* Provider Row */
    .provider-row {
      display: grid;
      grid-template-columns: 40px 1fr 80px 70px 60px 90px;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: center;
      transition: background 0.15s;
    }
    .provider-row:last-child { border-bottom: none; }
    .provider-row:hover { background: rgba(255,255,255,0.02); }
    
    .rank {
      font-size: 14px;
      font-weight: 700;
      color: rgba(255,255,255,0.4);
    }
    .rank.top { color: #00d4ff; }
    
    .provider-info { min-width: 0; }
    .provider-name {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .provider-area {
      font-size: 11px;
      color: rgba(255,255,255,0.4);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .metric {
      font-size: 12px;
      color: rgba(255,255,255,0.7);
    }
    .metric.response { color: #4ade80; }
    .metric.reliability { color: #fbbf24; }
    
    .whatsapp-btn {
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      background: #25D366;
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background 0.15s;
    }
    .whatsapp-btn:hover { background: #128C7E; }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: rgba(255,255,255,0.5);
    }
    .empty-state a { color: #00d4ff; }
    
    /* Mobile Responsive */
    @media (max-width: 640px) {
      .leaderboard-header { display: none; }
      .provider-row {
        grid-template-columns: 32px 1fr auto;
        gap: 12px;
        padding: 14px 12px;
      }
      .provider-info { grid-column: 2; }
      .whatsapp-btn { grid-column: 3; }
      .metric { display: none; }
      .rank { font-size: 12px; }
      
      /* Mobile metrics inline */
      .provider-area::before {
        content: attr(data-metrics);
        display: block;
        color: rgba(255,255,255,0.5);
        margin-top: 2px;
      }
    }
    
    /* Desktop */
    @media (min-width: 768px) {
      header { padding: 16px 24px; }
      main { padding: 24px; }
      .provider-row { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <header>
    <a href="homepage.html" class="back-link">← Back</a>
    <span class="category-title" id="category-title">Loading...</span>
    <span></span>
  </header>

  <main>
    <div class="summary-bar">
      <span><span class="dot"></span> <span id="available-count">0</span> available</span>
      <span>⚡ <span id="avg-response">--</span> avg response</span>
      <span id="total-count">0 Task Leaders</span>
    </div>

    <div class="sort-controls">
      <button class="sort-btn active" onclick="setSort('default')">Rank</button>
      <button class="sort-btn" onclick="setSort('response_time')">⚡ Response</button>
      <button class="sort-btn" onclick="setSort('reliability')">Reliability</button>
      <button class="sort-btn" onclick="setSort('price')">Price</button>
    </div>

    <div class="leaderboard" id="leaderboard">
      <div class="leaderboard-header">
        <span>#</span>
        <span>Provider</span>
        <span>Response</span>
        <span>Reliability</span>
        <span>Price</span>
        <span></span>
      </div>
      <div id="provider-list">
        <!-- Populated by JS -->
      </div>
    </div>

    <div class="empty-state" id="empty-state" style="display: none;">
      <p>No providers in this category yet.</p>
      <p><a href="become-task-leader.html">Be the first to apply</a></p>
    </div>
  </main>

  <!-- WhatsApp Modal -->
  <div id="whatsapp-modal" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 16px;">
    <div style="background: #0a0a1a; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; max-width: 400px; width: 100%; padding: 24px;">
      <h3 style="margin: 0 0 16px 0; font-size: 18px;">Contact <span id="modal-provider-name"></span></h3>
      
      <div style="background: rgba(255,255,255,0.05); border-radius: 6px; padding: 12px; margin-bottom: 16px; font-size: 14px; color: rgba(255,255,255,0.8); border-left: 3px solid #25D366;">
        <p style="margin: 0; font-style: italic;">"Hi! I found you on TaskLeaders and need help with <span id="modal-category"></span>."</p>
      </div>
      
      <label style="display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; cursor: pointer;">
        <input type="checkbox" id="consent-checkbox" style="margin-top: 2px;">
        <span style="font-size: 13px; color: rgba(255,255,255,0.7); line-height: 1.4;">I agree to receive follow-up messages from TaskLeaders related to this inquiry.</span>
      </label>
      
      <button onclick="proceedToWhatsApp()" style="width: 100%; padding: 14px; border-radius: 6px; border: none; background: #25D366; color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; margin-bottom: 10px;">
        Continue to WhatsApp
      </button>
      <button onclick="closeModal()" style="width: 100%; padding: 12px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.6); font-size: 14px; cursor: pointer;">
        Cancel
      </button>
    </div>
  </div>

  <script src="js/db.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const categoryId = urlParams.get('category') || 'painting';
    let currentSort = 'default';
    let selectedProvider = null;

    function init() {
      const category = TaskLeadersDB.categories.find(c => c.id === categoryId);
      if (category) {
        document.getElementById('category-title').textContent = `${category.icon} ${category.name}`;
        document.title = `${category.name} — TaskLeaders`;
      }
      loadProviders();
    }

    function loadProviders() {
      const providers = TaskLeadersDB.getProvidersByCategory(categoryId);
      const stats = TaskLeadersDB.getCategoryStats(categoryId);

      document.getElementById('total-count').textContent = `${providers.length} Task Leader${providers.length !== 1 ? 's' : ''}`;
      document.getElementById('available-count').textContent = stats.available_now;
      document.getElementById('avg-response').textContent = stats.avg_response_time > 0 ? `~${stats.avg_response_time}m` : '--';

      if (providers.length === 0) {
        document.getElementById('leaderboard').style.display = 'none';
        document.getElementById('empty-state').style.display = 'block';
        return;
      }

      const sorted = TaskLeadersDB.sortProviders(providers, currentSort);
      renderProviderList(sorted);
    }

    function renderProviderList(providers) {
      const list = document.getElementById('provider-list');
      const categoryName = TaskLeadersDB.categories.find(c => c.id === categoryId)?.name || categoryId;

      list.innerHTML = providers.map((p, index) => {
        const rank = index + 1;
        const rankClass = rank <= 3 ? 'top' : '';
        const responseTime = TaskLeadersDB.formatResponseTime(p.response_time_minutes);
        const reliability = Math.round(p.reliability_score * 20); // Convert 0-5 to 0-100%
        
        // Mobile metrics string
        const mobileMetrics = `⚡ ${responseTime} • ${reliability}% reliable • $${p.hourly_rate}`;

        return `
          <div class="provider-row">
            <span class="rank ${rankClass}">${rank}</span>
            <div class="provider-info">
              <div class="provider-name">${escapeHtml(p.business_name)}</div>
              <div class="provider-area" data-metrics="${mobileMetrics}">${escapeHtml(p.service_area)}</div>
            </div>
            <span class="metric response">${responseTime}</span>
            <span class="metric reliability">${reliability}%</span>
            <span class="metric">$${p.hourly_rate}</span>
            <button class="whatsapp-btn" onclick="openWhatsAppModal('${p.provider_id}', '${categoryName}')">
              💬 WhatsApp
            </button>
          </div>
        `;
      }).join('');
    }

    function setSort(sortBy) {
      currentSort = sortBy;
      document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      loadProviders();
    }

    function openWhatsAppModal(providerId, categoryName) {
      const provider = TaskLeadersDB.getProviderById(providerId);
      if (!provider) return;

      selectedProvider = provider;
      document.getElementById('modal-provider-name').textContent = provider.business_name;
      document.getElementById('modal-category').textContent = categoryName;
      document.getElementById('consent-checkbox').checked = false;
      document.getElementById('whatsapp-modal').style.display = 'flex';
    }

    function proceedToWhatsApp() {
      if (!selectedProvider) return;

      const hasConsent = document.getElementById('consent-checkbox').checked;
      
      // Log the inquiry (in real app, send to backend)
      console.log('WhatsApp inquiry:', {
        provider: selectedProvider.provider_id,
        consent: hasConsent,
        timestamp: new Date().toISOString()
      });

      const categoryName = TaskLeadersDB.categories.find(c => c.id === selectedProvider.category)?.name || selectedProvider.category;
      const message = encodeURIComponent(`Hi! I found you on TaskLeaders and need help with ${categoryName}.`);
      const whatsappUrl = `https://wa.me/${selectedProvider.whatsapp_number}?text=${message}`;

      closeModal();
      window.open(whatsappUrl, '_blank');
    }

    function closeModal() {
      document.getElementById('whatsapp-modal').style.display = 'none';
      selectedProvider = null;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Close modal on backdrop click
    document.getElementById('whatsapp-modal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    init();
  </script>
</body>
</html>
